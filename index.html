<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fleet Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e8eaf0; font-family: 'Aptos','Nunito','Segoe UI',sans-serif; min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }

    /* ── scrollbar ── */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2e3347; border-radius: 3px; }

    /* ── utility ── */
    .badge { border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .card  { background: #1a1d26; border-radius: 10px; border: 1px solid #2e3347; }

    /* ── header ── */
    #header { background:#1a1d26; border-bottom:1px solid #2e3347; display:flex; align-items:center;
              justify-content:space-between; padding:8px 16px; position:sticky; top:0; z-index:100; min-height:56px; gap:8px; flex-wrap:wrap; }
    #header .logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    #header .logo span { font-weight:800; font-size:14px; letter-spacing:2px; }
    #nav { display:flex; gap:4px; flex-wrap:wrap; }
    #nav button { background:transparent; border:none; color:#8b95a8; padding:6px 10px; border-radius:6px;
                  cursor:pointer; font-size:12px; font-weight:600; letter-spacing:.5px; transition:all .15s; }
    #nav button.active { background:#3d7eff22; color:#3d7eff; }
    #header-actions { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    @media (max-width:600px) {
      #header { padding:8px 10px; }
      #nav button { padding:5px 7px; font-size:11px; }
      .btn { padding:5px 8px; font-size:11px; }
    }

    /* ── content ── */
    #content { max-width:900px; margin:0 auto; padding:20px; }

    /* ── stat cards ── */
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { border-radius:10px; padding:16px; }

    /* ── forms ── */
    .field { margin-bottom:14px; }
    .field label { display:block; color:#8b95a8; font-size:12px; margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
    .field input, .field select, .field textarea {
      width:100%; background:#0f1117; border:1px solid #2e3347; border-radius:6px;
      padding:8px 12px; color:#e8eaf0; font-size:14px; outline:none; }
    .field textarea { resize:vertical; line-height:1.6; }

    /* ── buttons ── */
    .btn        { padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; border:none; background:#3d7eff; color:#fff; }
    .btn-ghost  { background:transparent; border:1px solid #2e3347; color:#8b95a8; }
    .btn-danger { background:#ff3b3b22; border:1px solid #ff3b3b44; color:#ff3b3b; }
    .btn-green  { background:#06d6a022; border:1px solid #06d6a044; color:#06d6a0; }
    .btn-yellow { background:#ffd16622; border:1px solid #ffd16644; color:#ffd166; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }

    /* ── modal ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center;
               justify-content:center; z-index:1000; padding:16px; }
    .modal   { background:#1a1d26; border-radius:12px; padding:24px; width:100%; max-width:480px;
               border:1px solid #2e3347; max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .modal-header h3 { font-size:18px; }
    .modal-close { background:none; border:none; color:#666; font-size:22px; cursor:pointer; }

    /* ── tabs ── */
    .tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
    .tab  { padding:8px 14px; border:none; cursor:pointer; font-size:12px; font-weight:600;
            border-radius:6px; letter-spacing:.5px; background:transparent; color:#8b95a8; }
    .tab.active { background:#3d7eff; color:#fff; }

    /* ── rows ── */
    .row      { background:#0f1117; border-radius:8px; padding:12px 14px; margin-bottom:8px; border:1px solid #2e3347; }
    .row-flex { display:flex; justify-content:space-between; align-items:center; }

    /* ── vehicle card ── */
    .v-card { cursor:pointer; padding:16px; transition:border-color .2s; }

    /* ── spinner ── */
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid #3d7eff44;
               border-top-color:#3d7eff; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── alert banner ── */
    #alert-banner { position:fixed; bottom:16px; right:16px; padding:10px 18px; border-radius:8px;
                    font-size:13px; font-weight:600; z-index:2000; display:none; }

    /* ── auth ── */
    .auth-screen { display:flex; flex-direction:column; align-items:center; justify-content:center;
                   min-height:100vh; padding:20px; }
    .auth-box { background:#1a1d26; border:1px solid #2e3347; border-radius:16px;
                padding:32px; width:100%; max-width:400px; }
    .auth-box h2 { color:#e8eaf0; font-size:20px; font-weight:800; margin-bottom:4px; }
    .auth-box p  { color:#8b95a8; font-size:13px; margin-bottom:24px; }
    .auth-tabs { display:flex; margin-bottom:24px; border-bottom:1px solid #2e3347; }
    .auth-tab  { flex:1; padding:10px; text-align:center; font-size:13px; font-weight:700;
                 cursor:pointer; color:#8b95a8; border:none; background:none;
                 border-bottom:2px solid transparent; transition:.15s; }
    .auth-tab.active { color:#3d7eff; border-bottom-color:#3d7eff; }
    .auth-divider { display:flex; align-items:center; gap:10px; margin:16px 0; color:#8b95a8; font-size:12px; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:#2e3347; }
    .auth-error { color:#ff3b3b; font-size:12px; margin-top:8px; min-height:18px; }
    .btn-google { width:100%; padding:10px; border-radius:8px; border:1px solid #2e3347; background:#1a1d26;
                  color:#e8eaf0; font-size:14px; font-weight:600; cursor:pointer; display:flex;
                  align-items:center; justify-content:center; gap:10px; transition:border-color .15s; }
    .btn-google:hover { border-color:#3d7eff; }
    #user-chip { display:flex; align-items:center; gap:6px; }
    #user-chip img { width:24px; height:24px; border-radius:50%; object-fit:cover; }
    #user-chip .uname { color:#8b95a8; font-size:11px; max-width:90px;
                        overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── auth ── */
    .auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .auth-box{background:#1a1d26;border:1px solid #2e3347;border-radius:16px;padding:32px;width:100%;max-width:400px}
    .auth-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid #2e3347}
    .auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:#8b95a8;border:none;background:none;border-bottom:2px solid transparent;transition:.15s}
    .auth-tab.active{color:#3d7eff;border-bottom-color:#3d7eff}
    .auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#8b95a8;font-size:12px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#2e3347}
    .auth-error{color:#ff3b3b;font-size:12px;margin-top:6px;min-height:16px}
    .btn-google{width:100%;padding:10px;border-radius:8px;border:1px solid #2e3347;background:#1a1d26;color:#e8eaf0;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s}
    .btn-google:hover{border-color:#3d7eff}
    #user-chip{display:flex;align-items:center;gap:6px}
    #user-chip img{width:24px;height:24px;border-radius:50%}
    #user-chip .uname{color:#8b95a8;font-size:11px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── checklist ── */
    .checklist-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:8px; margin-top:12px; }
    .checklist-item { display:flex; align-items:center; gap:10px; background:#1a1d26; border:1px solid #2e3347;
                      border-radius:8px; padding:10px 14px; cursor:pointer; transition:border-color .15s; }
    .checklist-item:hover { border-color:#3d7eff55; }
    .checklist-item.checked { border-color:#06d6a044; background:#06d6a008; }
    .checklist-item input[type=checkbox] { width:16px; height:16px; accent-color:#06d6a0; cursor:pointer; flex-shrink:0; }
    .checklist-item label { color:#e8eaf0; font-size:13px; cursor:pointer; flex:1; }
    .checklist-item.checked label { color:#8b95a8; text-decoration:line-through; }
  </style>
</head>
<body>

<!-- ALERT BANNER -->
<div id="alert-banner"></div>

<!-- ROOT -->
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#3d7eff;">
    <div class="spinner" style="width:32px;height:32px;margin-right:12px;"></div> Connessione a Firebase...
  </div>
</div>

<!-- Firebase Auth SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function daysUntil(d) {
  if (!d) return 9999;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(d) - t) / 86400000);
}
function fmtDate(d) {
  if (!d) return "—";
  const [y,m,dd] = d.split("-"); return `${dd}/${m}/${y}`;
}
function urgColor(n) {
  if (n < 0)   return "#ff3b3b";
  if (n <= 14) return "#ff6b35";
  if (n <= 30) return "#ffd166";
  return "#06d6a0";
}
function urgLabel(n) {
  if (n < 0)   return "SCADUTA";
  if (n <= 14) return "URGENTE";
  if (n <= 30) return "IN SCADENZA";
  return "OK";
}
function badge(days) {
  const c = urgColor(days), l = urgLabel(days);
  return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}55">${l}</span>`;
}
function showAlert(msg, ok=true) {
  const el = document.getElementById("alert-banner");
  el.textContent = msg;
  el.style.background = ok ? "#06d6a022" : "#ff3b3b22";
  el.style.color = ok ? "#06d6a0" : "#ff3b3b";
  el.style.border = `1px solid ${ok ? "#06d6a044" : "#ff3b3b44"}`;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 3500);
}
function canEdit() {
  if (CURRENT_FLEET_ROLE === "viewer") {
    showAlert("👁 Sei in modalità sola lettura", false);
    return false;
  }
  return true;
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ═══════════════════════════════════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════════════════════════════════
function defaultData() {
  return {
    vehicles: [
      {id:1,targa:"AB123CD",modello:"Fiat Ducato",anno:2021,km:45000,note:""},
      {id:2,targa:"EF456GH",modello:"Ford Transit",anno:2020,km:62000,note:""},
      {id:3,targa:"IL789MN",modello:"Fiat Ducato",anno:2022,km:28000,note:""},
      {id:4,targa:"OP012QR",modello:"Iveco Daily",anno:2019,km:89000,note:""},
      {id:5,targa:"ST345UV",modello:"Renault Master",anno:2021,km:51000,note:""},
      {id:6,targa:"XY678ZA",modello:"VW Crafter",anno:2023,km:15000,note:""},
    ],
    scadenze: [
      {id:1,vehicleId:1,tipo:"Bollo",scadenza:"2025-04-30",note:""},
      {id:2,vehicleId:1,tipo:"Revisione",scadenza:"2025-06-15",note:""},
      {id:3,vehicleId:2,tipo:"Tagliando",scadenza:"2025-03-20",note:"Ogni 30.000 km"},
      {id:4,vehicleId:2,tipo:"Bollo",scadenza:"2025-05-31",note:""},
      {id:5,vehicleId:3,tipo:"Assicurazione",scadenza:"2025-07-01",note:""},
      {id:6,vehicleId:4,tipo:"Revisione",scadenza:"2025-02-28",note:""},
    ],
    manutenzioni: [],
    kmLog: [],
    gomme: [],
    nextId: {scadenza:10,manutenzione:1,km:1,gomma:1}
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let DATA = null;
let VIEW = "dashboard";         // dashboard | flotta | scadenze
let SELECTED_VEHICLE = null;    // vehicle object
let VEHICLE_TAB = "scadenze";   // scadenze | manutenzioni | km | gomme | note
let MODAL = null;               // null | {type, data}
let SAVING = false;
let CURRENT_USER = null;
let CURRENT_FLEET_ID   = "personal";  // "personal" | fleetId
let CURRENT_FLEET_ROLE = "admin";     // "admin"|"editor"|"viewer"
let MY_FLEETS = {};                    // { fleetId: {name, role} }

// ═══════════════════════════════════════════════════════════════════════════
// EXCEL EXPORT
// ═══════════════════════════════════════════════════════════════════════════
function exportExcel() {
  const { vehicles, scadenze, manutenzioni, kmLog, gomme } = DATA;
  const wb = XLSX.utils.book_new();

  const hStyle = { font:{bold:true,color:{rgb:"FFFFFF"}}, fill:{patternType:"solid",fgColor:{rgb:"1A3A6B"}}, alignment:{horizontal:"center"} };
  function styleHeaders(ws) {
    const range = XLSX.utils.decode_range(ws["!ref"]);
    for (let C = range.s.c; C <= range.e.c; C++) {
      const a = XLSX.utils.encode_cell({r:0,c:C});
      if (ws[a]) ws[a].s = hStyle;
    }
  }

  const wF = XLSX.utils.aoa_to_sheet([
    ["ID","Targa","Modello","Anno","Km attuali","Note"],
    ...vehicles.map(v=>[v.id,v.targa,v.modello,v.anno,v.km,v.note||""])
  ]);
  wF["!cols"]=[{wch:6},{wch:12},{wch:20},{wch:8},{wch:14},{wch:40}]; styleHeaders(wF);
  XLSX.utils.book_append_sheet(wb, wF, "Furgoni");

  const wS = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Tipo scadenza","Data scadenza","Note"],
    ...scadenze.map(s=>{ const v=vehicles.find(x=>x.id===s.vehicleId)||{}; return [s.id,v.modello||"",v.targa||"",s.tipo,s.scadenza,s.note||""]; })
  ]);
  wS["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:18},{wch:16},{wch:30}]; styleHeaders(wS);
  XLSX.utils.book_append_sheet(wb, wS, "Scadenze");

  const wM = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Tipo","Descrizione","Data","Km","Costo (€)"],
    ...manutenzioni.map(m=>{ const v=vehicles.find(x=>x.id===m.vehicleId)||{}; return [m.id,v.modello||"",v.targa||"",m.tipo,m.descrizione,m.data,m.km,m.costo||""]; })
  ]);
  wM["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:14},{wch:30},{wch:12},{wch:10},{wch:12}]; styleHeaders(wM);
  XLSX.utils.book_append_sheet(wb, wM, "Manutenzioni");

  const wK = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Km rilevati","Data","Note"],
    ...kmLog.map(k=>{ const v=vehicles.find(x=>x.id===k.vehicleId)||{}; return [k.id,v.modello||"",v.targa||"",k.km,k.data,k.note||""]; })
  ]);
  wK["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:14},{wch:12},{wch:30}]; styleHeaders(wK);
  XLSX.utils.book_append_sheet(wb, wK, "Registro KM");

  const wG = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Tipo gomme","Data montaggio","Marca","Note"],
    ...gomme.map(g=>{ const v=vehicles.find(x=>x.id===g.vehicleId)||{}; return [g.id,v.modello||"",v.targa||"",g.tipo,g.data,g.marca||"",g.note||""]; })
  ]);
  wG["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:14},{wch:16},{wch:16},{wch:30}]; styleHeaders(wG);
  XLSX.utils.book_append_sheet(wb, wG, "Cambio Gomme");

  XLSX.writeFile(wb, `fleet_backup_${new Date().toISOString().split("T")[0]}.xlsx`);
  showAlert("✅ Backup Excel esportato!");
}

// ═══════════════════════════════════════════════════════════════════════════
// EXCEL IMPORT
// ═══════════════════════════════════════════════════════════════════════════
function importExcel(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ps = (n) => { const ws=wb.Sheets[n]; return ws ? XLSX.utils.sheet_to_json(ws,{defval:""}) : []; };

      const vehicles = ps("Furgoni").map(r=>({
        id:Number(r["ID"]), targa:String(r["Targa"]||"").toUpperCase(),
        modello:String(r["Modello"]||""), anno:Number(r["Anno"])||0,
        km:Number(r["Km attuali"])||0, note:String(r["Note"]||"")
      }));
      const byTarga = {}; vehicles.forEach(v=>{ byTarga[v.targa]=v.id; });

      const scadenze = ps("Scadenze").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        tipo:String(r["Tipo scadenza"]||""), scadenza:String(r["Data scadenza"]||""), note:String(r["Note"]||"")
      }));
      const manutenzioni = ps("Manutenzioni").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        tipo:String(r["Tipo"]||""), descrizione:String(r["Descrizione"]||""),
        data:String(r["Data"]||""), km:Number(r["Km"])||0, costo:Number(r["Costo (€)"])||0
      }));
      const kmLog = ps("Registro KM").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        km:Number(r["Km rilevati"])||0, data:String(r["Data"]||""), note:String(r["Note"]||"")
      }));
      const gomme = ps("Cambio Gomme").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        tipo:String(r["Tipo gomme"]||""), data:String(r["Data montaggio"]||""),
        marca:String(r["Marca"]||""), note:String(r["Note"]||"")
      }));
      const mx = arr => arr.length>0 ? Math.max(...arr.map(x=>x.id))+1 : 1;

      DATA = { vehicles, scadenze, manutenzioni, kmLog, gomme,
        nextId:{scadenza:mx(scadenze),manutenzione:mx(manutenzioni),km:mx(kmLog),gomma:mx(gomme)} };
      saveData();
      render();
      showAlert(`✅ Importati ${vehicles.length} furgoni`);
    } catch(err) {
      showAlert("❌ File non valido", false);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  // Sanitize — garantisce che tutti gli array esistano sempre
  if (!DATA) DATA = defaultData();
  const toArr = (v) => { if (!v) return []; if (Array.isArray(v)) return v; return Object.values(v).filter(x => x && typeof x === "object"); };
  DATA.vehicles     = toArr(DATA.vehicles);
  DATA.scadenze     = toArr(DATA.scadenze);
  DATA.manutenzioni = toArr(DATA.manutenzioni);
  DATA.kmLog        = toArr(DATA.kmLog);
  DATA.gomme        = toArr(DATA.gomme);
  if (!DATA.nextId) DATA.nextId = {scadenza:10,manutenzione:1,km:1,gomma:1};
  // Prima render: pulisce spinner
  if (!document.getElementById("header")) {
    document.getElementById("app").innerHTML = "";
  }
  renderHeader();
  renderContent();
}

function renderHeader() {
  const existing = document.getElementById("header");
  const html = `
  <div id="header">
    <div class="logo">
      <span style="font-size:20px">🚐</span>
      <div>
        <span style="color:#e8eaf0;font-size:13px;font-weight:800;letter-spacing:2px">FLEET MANAGER</span>
        <div style="color:#8b95a8;font-size:10px;margin-top:-1px">
          ${CURRENT_FLEET_ID==="personal"?"Flotta personale":esc(MY_FLEETS[CURRENT_FLEET_ID]?.name||"")}
        </div>
      </div>
    </div>
    <div id="nav" style="display:flex;gap:4px">
      <button class="tab ${VIEW==='dashboard'?'active':''}" onclick="navigate('dashboard')">📊 Dashboard</button>
      <button class="tab ${VIEW==='flotta'?'active':''}" onclick="navigate('flotta')">🚐 Flotta</button>

function renderDashboard() {
  const { scadenze, vehicles, manutenzioni, kmLog } = DATA;
  const alerts = scadenze.map(s=>({...s,days:daysUntil(s.scadenza)})).filter(s=>s.days<=30).sort((a,b)=>a.days-b.days);
  const scad   = alerts.filter(a=>a.days<0).length;
  const urg    = alerts.filter(a=>a.days>=0&&a.days<=14).length;
  const ins    = alerts.filter(a=>a.days>14&&a.days<=30).length;

  const stats = [
    {l:"Scadute",       v:scad,              c:"#ff3b3b"},
    {l:"Urgenti (≤14gg)",v:urg,             c:"#ff6b35"},
    {l:"In scadenza (≤30gg)",v:ins,         c:"#ffd166"},
    {l:"Furgoni attivi",v:vehicles.length,  c:"#3d7eff"},
    {l:"Manutenzioni",  v:manutenzioni.length,c:"#06d6a0"},
    {l:"Aggiornam. km", v:kmLog.length,     c:"#a78bfa"},
  ];

  let rows = "";
  if (alerts.length === 0) {
    rows = `<div style="color:#8b95a8;text-align:center;padding:32px">✅ Nessuna scadenza nei prossimi 30 giorni</div>`;
  } else {
    alerts.forEach(a => {
      const v = vehicles.find(x=>x.id===a.vehicleId)||{};
      const c = urgColor(a.days);
      rows += `<div style="background:#1a1d26;border-radius:8px;padding:12px 16px;margin-bottom:8px;
                border:1px solid ${c}33;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <span style="color:#e8eaf0;font-weight:600">${esc(a.tipo)}</span>
          <span style="color:#8b95a8;font-size:13px;margin-left:8px">${esc(v.targa||"")} — ${esc(v.modello||"")}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:#8b95a8;font-size:12px">${fmtDate(a.scadenza)}</span>
          ${badge(a.days)}
        </div>
      </div>`;
    });
  }

  return `
    <div class="stat-grid">${stats.map(s=>`
      <div class="stat-card" style="border:1px solid ${s.c}33">
        <div style="font-size:28px;font-weight:800;color:${s.c}">${s.v}</div>
        <div style="font-size:11px;color:#8b95a8;margin-top:2px">${s.l}</div>
      </div>`).join("")}
    </div>
    <h3 style="color:#e8eaf0;font-size:14px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">⚠️ Scadenze imminenti</h3>

let KM_CHART_MODE = "mese";

function setKmChartMode(mode) {
  KM_CHART_MODE = mode;
  // Aggiorna solo il grafico senza ricostruire tutto il DOM
  const container = document.getElementById("km-chart-container");
  if (container) {
    const vid = SELECTED_VEHICLE ? SELECTED_VEHICLE.id : null;
    if (vid !== null) {
      container.outerHTML = buildKmGrafico(DATA.kmLog.filter(k=>k.vehicleId===vid));
    }
  }
}

function buildKmGrafico(items) {
  if (items.length === 0) return `<div id="km-chart-container"></div>`;

  const sorted = [...items].sort((a,b)=>new Date(a.data)-new Date(b.data));

  // Raggruppa: prende il km massimo per ogni periodo
  const groups = {};
  sorted.forEach(k => {
    const d = new Date(k.data);
    const key = KM_CHART_MODE === "mese"
      ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`
      : `${d.getFullYear()}`;
    if (!(key in groups) || k.km > groups[key]) groups[key] = k.km;
  });

  const keys = Object.keys(groups).sort();

  // Calcola delta: km percorsi in ogni periodo rispetto al precedente
  // Se un solo periodo, mostra i km totali come valore assoluto
  let bars = "";
  if (keys.length === 1) {
    // Un solo periodo: mostra valore assoluto
    const label = KM_CHART_MODE === "mese"
      ? keys[0].slice(5) + "/" + keys[0].slice(2,4)
      : keys[0];
    bars = `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
      <span style="color:#8b95a8;font-size:9px;font-weight:600">${Number(groups[keys[0]]).toLocaleString("it-IT")}</span>
      <div style="width:40px;height:110px;background:#3d7eff;border-radius:4px 4px 0 0;min-height:3px"></div>
      <span style="color:#8b95a8;font-size:9px;white-space:nowrap">${label}</span>
    </div>`;
  } else {
    const deltas = keys.map((k,i) => {
      if (i === 0) return null;
      return { label: k, val: Math.max(0, groups[k] - groups[keys[i-1]]) };
    }).filter(Boolean);

    const maxVal = Math.max(...deltas.map(d=>d.val), 1);
    const barWidth = Math.max(24, Math.min(52, Math.floor(540 / deltas.length) - 6));

    bars = deltas.map(d => {
      const h = Math.max(3, Math.round((d.val / maxVal) * 110));
      const isMax = d.val === maxVal;
      const color = isMax ? "#3d7eff" : "#3d7eff66";
      const label = KM_CHART_MODE === "mese"
        ? d.label.slice(5) + "/" + d.label.slice(2,4)
        : d.label;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
        <span style="color:${isMax?'#e8eaf0':'#8b95a8'};font-size:9px;font-weight:${isMax?700:400}">${Number(d.val).toLocaleString("it-IT")}</span>
        <div style="width:${barWidth}px;height:${h}px;background:${color};border-radius:4px 4px 0 0;"
             title="${label}: ${Number(d.val).toLocaleString("it-IT")} km"></div>
        <span style="color:#8b95a8;font-size:9px;white-space:nowrap">${label}</span>
      </div>`;
    }).join("");
  }

  return `<div id="km-chart-container" style="background:#1a1d26;border:1px solid #2e3347;border-radius:10px;padding:16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:#e8eaf0;font-size:13px;font-weight:700">📈 KM PERCORSI</span>
      <div style="display:flex;gap:4px">
        <button onclick="setKmChartMode('mese')"
          style="font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid #3d7eff;
                 background:${KM_CHART_MODE==='mese'?'#3d7eff':'transparent'};
                 color:${KM_CHART_MODE==='mese'?'#fff':'#3d7eff'}">Per mese</button>
        <button onclick="setKmChartMode('anno')"
          style="font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid #3d7eff;
                 background:${KM_CHART_MODE==='anno'?'#3d7eff':'transparent'};
                 color:${KM_CHART_MODE==='anno'?'#fff':'#3d7eff'}">Per anno</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <div style="display:flex;align-items:flex-end;gap:6px;min-height:140px;padding:4px 0 0 0;min-width:fit-content">
        ${bars}
      </div>
    </div>
  </div>`;
}

function renderChecklistTab(v) {
  const checklist = (v.checklist || []);

  const normalize = (c) => typeof c === "object" ? c : { i: c, data: new Date().toISOString().split("T")[0] };
  const checkedMap = {};
  checklist.forEach(c => { const n = normalize(c); checkedMap[n.i] = n.data; });

  const items = CHECKLIST_VOCI.map((voce, i) => {
    const isChecked = i in checkedMap;
    const dataVal = checkedMap[i] || "";
    return `<div class="checklist-item ${isChecked?'checked':''}" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div style="display:flex;align-items:center;gap:10px;width:100%" onclick="toggleChecklist(${v.id},${i})">
        <input type="checkbox" ${isChecked?'checked':''} onclick="event.stopPropagation();toggleChecklist(${v.id},${i})"/>
        <label style="flex:1">${esc(voce)}</label>
      </div>
      ${isChecked ? `<input type="date" value="${dataVal}"
        style="background:#0f1117;border:1px solid #2e3347;border-radius:5px;padding:3px 8px;color:#8b95a8;font-size:11px;width:100%;outline:none"
        onclick="event.stopPropagation()"
        onchange="setChecklistDate(${v.id},${i},this.value)"/>` : ""}
    </div>`;
  }).join("");

  const done = Object.keys(checkedMap).length;
  const pct = Math.round(done / CHECKLIST_VOCI.length * 100);
  const barColor = pct === 100 ? "#06d6a0" : pct >= 50 ? "#ffd166" : "#3d7eff";

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:#8b95a8;font-size:13px">${done} / ${CHECKLIST_VOCI.length} completate</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="width:100px;height:6px;background:#2e3347;border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px;transition:width .3s"></div>
        </div>
        <span style="color:${barColor};font-size:12px;font-weight:700">${pct}%</span>
        <button class="btn" onclick="resetChecklist(${v.id})">🔄 Reset</button>
        <button class="btn btn-green" onclick="salvaChecklistInManutenzioni(${v.id})" title="Registra le voci spuntate come manutenzione">📋 Salva in manutenzioni</button>
      </div>
    </div>
    <div class="checklist-grid">${items}</div>`;
}

function toggleChecklist(vehicleId, index) {
  if (!canEdit()) return;
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  if (!v.checklist) v.checklist = [];
  const existing = v.checklist.findIndex(c => (typeof c === "object" ? c.i : c) === index);
  if (existing === -1) {
    const today = new Date().toISOString().split("T")[0];
    v.checklist.push({ i: index, data: today });
  } else {
    v.checklist.splice(existing, 1);
  }
  saveData();
  renderContent();
}

function setChecklistDate(vehicleId, index, dateVal) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v || !v.checklist) return;
  const existing = v.checklist.find(c => (typeof c === "object" ? c.i : c) === index);
  if (existing && typeof existing === "object") {
    existing.data = dateVal;
    saveData();
  }
}

function salvaChecklistInManutenzioni(vehicleId) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v || !v.checklist || v.checklist.length === 0) {
    showAlert("❌ Nessuna voce spuntata nella checklist", false); return;
  }
  const checked = v.checklist.map(c => typeof c === "object" ? c : { i: c, data: new Date().toISOString().split("T")[0] });
  const voci = checked.map(c => `• ${CHECKLIST_VOCI[c.i]} (${fmtDate(c.data)})`).join("\n");
  DATA.manutenzioni.push({
    id: DATA.nextId.manutenzione++,
    vehicleId,
    tipo: "Ordinaria",
    descrizione: "Checklist manutenzione",
    data: checked[0].data,
    km: v.km || 0,
    costo: 0,
    note: voci
  });
  saveData();
  showAlert("✅ Checklist salvata nelle manutenzioni!");
  renderContent();
}

function resetChecklist(vehicleId) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  v.checklist = [];
  saveData();
  renderContent();
}

// Mesi da aggiungere per tipo scadenza
const RINNOVO_MESI = { "Bollo": 12, "Revisione": 24, "Tagliando": 12, "Assicurazione": 12 };

function completaScadenza(scadId, vehicleId, checked) {
  if (!canEdit()) { setTimeout(()=>renderContent(),0); return; }
  // setTimeout evita che il re-render distrugga il checkbox mentre gestisce l'evento
  setTimeout(() => {
    const s = DATA.scadenze.find(x => x.id === scadId);
    if (!s) return;

    if (!checked) {
      // Deselezionato: rimuovi flag done (annulla)
      s.done = false;
      saveData(); renderContent(); return;
    }

    const mesi = RINNOVO_MESI[s.tipo.trim()];

    // Marca la vecchia come completata (storico) — NON eliminare
    s.done = true;
    s.dataCompletata = new Date().toISOString().split("T")[0];

    if (mesi) {
      // Crea nuova scadenza partendo dalla data della vecchia
      const base = s.scadenza ? new Date(s.scadenza) : new Date();
      base.setMonth(base.getMonth() + mesi);
      const nuovaData = base.toISOString().split("T")[0];
      DATA.scadenze.push({
        id: DATA.nextId.scadenza++,
        vehicleId,
        tipo: s.tipo,
        scadenza: nuovaData,
        note: s.note || "",
        done: false
      });
      saveData(); renderContent();
      showAlert(`✅ ${s.tipo} rinnovata → ${fmtDate(nuovaData)}`);
    } else {
      saveData(); renderContent();
    }
  }, 0);
}

function submitKm(vid) {

function submitGomma(vid) {

function submitEditVehicle(vid) {

}

async function fbToken() { return await CURRENT_USER.getIdToken(); }

async function fbGet(url) {
  const r = await fetch(url+"?auth="+await fbToken());
  if (!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}
async function fbPut(url, data) {
  const r = await fetch(url+"?auth="+await fbToken(), {
    method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error("HTTP "+r.status);
}
async function fbPatch(url, data) {

    method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error("HTTP "+r.status);
}

// ── Migrazione: /fleet (legacy pubblico) → /users/{uid}/fleet ─────────────
async function migrateIfNeeded() {
  try {
    const existing = await fbGet(fbUserUrl(CURRENT_USER.uid));
    if (existing?.vehicles?.length > 0) return false; // già migrato
    const r = await fetch(fbLegacyUrl()); // legacy era pubblico, no auth
    if (!r.ok) return false;
    const legacy = await r.json();
    if (!legacy?.vehicles) return false;
    await fbPut(fbUserUrl(CURRENT_USER.uid), legacy);
    console.log("Migrazione OK:", legacy.vehicles.length, "veicoli");
    return true;
  } catch(e) { console.warn("Migrazione saltata:", e.message); return false; }

// ── Flotte condivise ──────────────────────────────────────────────────────
function genFleetId()   { return "fl_"+Math.random().toString(36).slice(2,10); }
function genInviteCode() {
  const ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return "FLEET-"+"XXXX".replace(/X/g,()=>ch[Math.floor(Math.random()*ch.length)]);
}

async function loadMyFleets() {
  try {
    const raw = await fbGet(fbUserFleetsUrl(CURRENT_USER.uid));
    if (!raw) { MY_FLEETS={}; return; }
    const fl = {};
    for (const fid of Object.keys(raw)) {
      try {
        const [meta, members] = await Promise.all([fbGet(fbFleetMetaUrl(fid)), fbGet(fbFleetMembersUrl(fid))]);
        fl[fid] = { name: meta?.name||fid, role: members?.[CURRENT_USER.uid]||"viewer" };
      } catch(e) { /* flotta rimossa */ }
    }
    MY_FLEETS = fl;
  } catch(e) { MY_FLEETS={}; }
}

async function createFleet(name) {
  const fid = genFleetId();
  const empty = defaultData(); empty.vehicles=[]; empty.scadenze=[];
  await Promise.all([
    fbPut(fbFleetMetaUrl(fid), {name, createdBy:CURRENT_USER.uid, createdAt:Date.now()}),
    fbPut(fbFleetMembersUrl(fid), {[CURRENT_USER.uid]:"admin"}),
    fbPut(fbFleetDataUrl(fid), empty),
    fbPatch(fbUserFleetsUrl(CURRENT_USER.uid), {[fid]:true})
  ]);
  MY_FLEETS[fid] = {name, role:"admin"};
  return fid;
}

async function generateAndPublishInvite(fleetId, role) {
  const code = genInviteCode();
  const expiresAt = Date.now()+24*60*60*1000;
  const inviteData = {role, createdBy:CURRENT_USER.uid, expiresAt};
  // Salva nell'indice globale (percorso senza auth nel path)
  await fbPut(FB_BASE+"/inviteCodes/"+code+".json", {fleetId, role, expiresAt});
  // Salva anche nella flotta (best-effort)
  await fbPut(FB_BASE+"/fleets/"+fleetId+"/invites/"+code+".json", inviteData).catch(()=>null);
  return code;
}

async function joinFleetByCode(code) {
  try {
    const inv = await fbGet(FB_BASE+"/inviteCodes/"+code+".json");
    if (!inv) return {ok:false, msg:"Codice non trovato"};
    if (Date.now() > inv.expiresAt) return {ok:false, msg:"Codice scaduto (era valido 24h)"};
    const fid = inv.fleetId;
    await Promise.all([
      fbPatch(fbFleetMembersUrl(fid), {[CURRENT_USER.uid]: inv.role}),
      fbPatch(fbUserFleetsUrl(CURRENT_USER.uid), {[fid]: true})
    ]);
    const meta = await fbGet(fbFleetMetaUrl(fid)).catch(()=>null);
    MY_FLEETS[fid] = {name: meta?.name||fid, role: inv.role};
    return {ok:true, name: meta?.name||fid, role: inv.role};
  } catch(e) { return {ok:false, msg:"Errore: "+e.message}; }
}

const toArr = (v) => {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === "object") return Object.values(v).filter(x => x && typeof x === "object");
  return [];
};

function normalizeData(val) {
  return {
    vehicles:     toArr(val.vehicles),
    scadenze:     toArr(val.scadenze),
    manutenzioni: toArr(val.manutenzioni),
    kmLog:        toArr(val.kmLog),
    gomme:        toArr(val.gomme),
    nextId:       val.nextId || {scadenza:10,manutenzione:1,km:1,gomma:1}
  };
}

async function saveData() {
  SAVING = true; renderHeader();
  try { await fbSave(DATA); }
  catch(e) { showAlert("❌ Errore salvataggio: " + e.message, false); }
  finally { SAVING = false; renderHeader(); }
}

// Polling ogni 15 secondi per aggiornamenti del team
let pollInterval = null;
async function startPolling() {
  clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const val = await fbLoad();
      if (!val) return;
      // Non fare render se l'utente sta scrivendo nelle note
      if (VEHICLE_TAB === "note" && document.getElementById("noteArea")) {
        const curNote = document.getElementById("noteArea").value;
        DATA = normalizeData(val);
        // Ripristina il testo che l'utente sta scrivendo
        const v = DATA.vehicles.find(x => x.id === SELECTED_VEHICLE?.id);
        if (v) v.note = curNote;
      } else {
        DATA = normalizeData(val);
        render();
      }
    } catch(e) { /* silenzioso */ }
  }, 15000);
}

    const switchBtn = active

    const adminBtn = f.role === "admin"
      ? '<button class="btn" onclick="openInvitePanel(\'' + fid + '\')" style="font-size:11px;padding:3px 9px">🔗</button>'

      + '<div style="color:#8b95a8;font-size:11px">' + (roleIcon[f.role]||'') + ' ' + (roleLabel[f.role]||f.role) + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:5px;flex-shrink:0">' + switchBtn + adminBtn + leaveBtn + '</div>'
      + '</div>';
  }).join('') || '<div style="color:#8b95a8;font-size:12px;padding:4px 0 8px">Nessuna flotta condivisa ancora</div>';

  const pBg  = pActive ? "#3d7eff18" : "#0f1117";

    ? '<span style="color:#3d7eff;font-size:11px;font-weight:700">ATTIVA</span>'

    + '<div class="modal-header"><h3>🏢 Gestione flotte</h3>'
    + '<button class="modal-close" onclick="document.getElementById(\'fleet-overlay\').remove()">×</button></div>'
    + '<div style="margin-bottom:16px">'
    + '<div style="color:#8b95a8;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px">LE MIE FLOTTE</div>'
    + '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:' + pBg + ';border:1px solid ' + pBdr + '">'
    + '<div style="flex:1"><div style="color:#e8eaf0;font-weight:600;font-size:13px">🙋 Flotta personale</div>'
    + '<div style="color:#8b95a8;font-size:11px">Solo tua — sempre disponibile</div></div>'

async function doCreateFleet() {
  const name = (document.getElementById("fp-name")?.value||"").trim();
  if (!name) { document.getElementById("fp-err").textContent="Inserisci un nome"; return; }
  document.getElementById("fp-err").textContent="⏳ Creazione...";
  try {
    const fid = await createFleet(name);
    document.getElementById("fleet-overlay")?.remove();
    showAlert('✅ Flotta "'+name+'" creata!');
    await switchFleet(fid);
  } catch(e) {
    document.getElementById("fp-err").textContent="Errore: "+e.message;
  }
}

async function doJoinFleet() {
  const code = (document.getElementById("fp-code")?.value||"").trim().toUpperCase();
  if (!code) { document.getElementById("fp-err").textContent="Inserisci il codice"; return; }
  document.getElementById("fp-err").textContent="⏳ Verifica codice...";
  const res = await joinFleetByCode(code);
  if (res.ok) {
    document.getElementById("fleet-overlay")?.remove();
    const rl = {admin:"Admin",editor:"Editor",viewer:"Solo lettura"}[res.role]||res.role;
    showAlert('✅ Entrato in "'+res.name+'" come '+rl+'!');
  } else {
    document.getElementById("fp-err").textContent="❌ "+res.msg;
  }
}

async function switchFleet(fleetId) {
  document.getElementById("fleet-overlay")?.remove();
  CURRENT_FLEET_ID   = fleetId;
  CURRENT_FLEET_ROLE = fleetId==="personal" ? "admin" : (MY_FLEETS[fleetId]?.role||"viewer");
  SELECTED_VEHICLE = null; VIEW = "dashboard";
  clearInterval(pollInterval);
  DATA = null;
  document.getElementById("app").innerHTML =
    `<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#3d7eff;font-size:16px">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;margin-right:10px"></div> Caricamento flotta...
    </div>`;
  try {
    const val = await fbLoad();
    if (!val) {
      DATA = defaultData(); DATA.vehicles=[]; DATA.scadenze=[];
      if (CURRENT_FLEET_ROLE!=="viewer") await fbSave(DATA);
    } else {
      DATA = normalizeData(val);
    }
    render(); startPolling();
    const name = fleetId==="personal" ? "Flotta personale" : (MY_FLEETS[fleetId]?.name||fleetId);
    showAlert("✅ "+name);
  } catch(e) {
    showAlert("❌ Errore: "+e.message, false);
    if (fleetId!=="personal") await switchFleet("personal");
  }
}

async function leaveFleet(fleetId) {
  if (!confirm("Sei sicuro di voler abbandonare questa flotta?")) return;
  try {
    await fbDelete(FB_BASE+"/fleets/"+fleetId+"/members/"+CURRENT_USER.uid+".json");
    await fbDelete(FB_BASE+"/userFleets/"+CURRENT_USER.uid+"/"+fleetId+".json");
    delete MY_FLEETS[fleetId];
    document.getElementById("fleet-overlay")?.remove();
    if (CURRENT_FLEET_ID===fleetId) await switchFleet("personal");
    else openFleetManager();
    showAlert("✅ Flotta abbandonata");
  } catch(e) { showAlert("❌ "+e.message, false); }
}

async function copyVehiclesToFleet(targetFleetId) {
  document.getElementById("fleet-overlay")?.remove();
  // Carica dati personali
  const prevFleet = CURRENT_FLEET_ID;
  const prevRole  = CURRENT_FLEET_ROLE;
  try {
    // Leggi flotta personale
    const personalData = await fbGet(fbUserUrl(CURRENT_USER.uid));
    if (!personalData?.vehicles?.length) {
      showAlert("⚠️ Nessun veicolo nella flotta personale", false); return;
    }
    // Leggi flotta destinazione
    const targetData = await fbGet(fbFleetDataUrl(targetFleetId));
    const merged = targetData ? normalizeData(targetData) : defaultData();
    // Copia veicoli (evita duplicati per targa)
    const existingTarghe = new Set(merged.vehicles.map(v => v.targa));
    const toAdd = personalData.vehicles.filter(v => !existingTarghe.has(v.targa));
    if (!toAdd.length) { showAlert("⚠️ Tutti i veicoli sono già presenti nella flotta", false); return; }
    // Ricalcola ID per evitare collisioni
    const maxId = Math.max(0, ...merged.vehicles.map(v => v.id||0));
    toAdd.forEach((v, i) => {
      const oldId = v.id;
      const newId = maxId + i + 1;
      v = {...v, id: newId};
      merged.vehicles.push(v);
      // Copia anche scadenze/manutenzioni/km/gomme collegate
      ["scadenze","manutenzioni","kmLog","gomme"].forEach(key => {
        const items = (personalData[key]||[]).filter(x => x.vehicleId === oldId);
        items.forEach(item => merged[key].push({...item, vehicleId: newId, id: (merged.nextId[key.replace("Log","")]||1) + merged[key].length}));
      });
    });
    // Salva nella flotta destinazione
    await fbPut(fbFleetDataUrl(targetFleetId), merged);
    const flName = MY_FLEETS[targetFleetId]?.name || targetFleetId;
    showAlert('✅ ' + toAdd.length + ' veicoli copiati in "' + flName + '"!');
  } catch(e) {
    showAlert("❌ Errore: " + e.message, false);
  }
}

function openCopyToFleetModal() {
  const adminFleets = Object.entries(MY_FLEETS).filter(([,f]) => f.role === "admin");
  if (!adminFleets.length) {
    showAlert("⚠️ Crea prima una flotta di gruppo di cui sei admin", false);
    openFleetManager(); return;
  }
  document.getElementById("fleet-overlay")?.remove();
  const overlay = document.createElement("div");
  overlay.className = "overlay"; overlay.id = "fleet-overlay";
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  const options = adminFleets.map(([fid,f]) =>
    '<button class="btn" onclick="copyVehiclesToFleet(\'' + fid + '\')" style="width:100%;text-align:left;padding:10px 14px;margin-bottom:6px">'
    + '🏢 ' + esc(f.name) + '</button>'
  ).join('');
  overlay.innerHTML = '<div class="modal" style="max-width:380px">'
    + '<div class="modal-header"><h3>📋 Copia veicoli in flotta</h3>'
    + '<button class="modal-close" onclick="document.getElementById(\'fleet-overlay\').remove()">×</button></div>'
    + '<p style="color:#8b95a8;font-size:13px;margin-bottom:14px">Scegli la flotta di gruppo dove copiare i veicoli della tua flotta personale:</p>'
    + options + '</div>';
  document.body.appendChild(overlay);
}


async function loginGoogle() {
  try {
    // Usa redirect invece di popup — più affidabile su GitHub Pages e mobile
    await fbAuth.signInWithRedirect(googleProvider);
  } catch(e) { setAuthError(authErr(e.code)); }
}

async function loginEmail() {
  const email = (document.getElementById("auth-email")?.value||"").trim();
  const pwd   = document.getElementById("auth-pwd")?.value||"";
  if (!email||!pwd) { setAuthError("Compila tutti i campi"); return; }
  try {
    await fbAuth.signInWithEmailAndPassword(email, pwd);
  } catch(e) { setAuthError(authErr(e.code)); }
}

async function registerEmail() {
  const email = (document.getElementById("auth-email")?.value||"").trim();
  const pwd   = document.getElementById("auth-pwd")?.value||"";
  const pwd2  = document.getElementById("auth-pwd2")?.value||"";
  if (!email||!pwd) { setAuthError("Compila tutti i campi"); return; }
  if (pwd!==pwd2)   { setAuthError("Le password non coincidono"); return; }
  if (pwd.length<6) { setAuthError("Password minimo 6 caratteri"); return; }
  try {
    await fbAuth.createUserWithEmailAndPassword(email, pwd);
  } catch(e) { setAuthError(authErr(e.code)); }
}

async function doLogout() {
  clearInterval(pollInterval);
  CURRENT_USER = null;
  DATA = null;
  await fbAuth.signOut();
}

function authErr(code) {
  return ({
    "auth/user-not-found":      "Account non trovato",
    "auth/wrong-password":      "Password errata",
    "auth/invalid-credential":  "Email o password errati",
    "auth/email-already-in-use":"Email già registrata",
    "auth/invalid-email":       "Email non valida",
    "auth/weak-password":       "Password troppo debole (min. 6 caratteri)",
    "auth/too-many-requests":   "Troppi tentativi, riprova tra poco",
    "auth/popup-closed-by-user":"Finestra Google chiusa",
  })[code] || ("Errore: " + code);
}

// ═══════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════
async function bootUser(user) {
  CURRENT_USER = user;
  CURRENT_FLEET_ID   = "personal";
  CURRENT_FLEET_ROLE = "admin";

  const appEl = document.getElementById("app");
  const setStatus = msg => {
    const s = document.getElementById("boot-status");
    if (s) s.textContent = msg;
  };
  appEl.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px">
      <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
      <div id="boot-status" style="color:#8b95a8;font-size:13px">Connessione...</div>
    </div>`;

  try {
    setStatus("Controllo dati esistenti...");
    const migrated = await migrateIfNeeded();
    if (migrated) setStatus("✅ Dati migrati al nuovo formato!");

    setStatus("Caricamento flotte condivise...");
    await loadMyFleets();

    setStatus("Caricamento flotta personale...");
    const val = await fbLoad();
    if (!val) {
      DATA = defaultData(); DATA.vehicles=[]; DATA.scadenze=[];
      await fbSave(DATA);
    } else {
      DATA = normalizeData(val);
    }
    render();
    startPolling();
  } catch(e) {
    appEl.innerHTML =
      `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
        <div style="font-size:48px">❌</div>
        <div style="color:#ff3b3b;font-size:16px;font-weight:700">Errore connessione</div>
        <div style="color:#8b95a8;font-size:13px;max-width:400px;text-align:center">${e.message}</div>
        <button class="btn" onclick="bootUser(CURRENT_USER)">🔄 Riprova</button>
      </div>`;
  }
}

window.addEventListener("load", () => {
  // Timeout di sicurezza: se Firebase non risponde in 8s, mostra login
  const authTimeout = setTimeout(() => {
    console.warn("Firebase Auth timeout — showing login screen");
    showAuthScreen();
  }, 8000);

  // Gestisci il risultato del redirect Google (se presente)
  fbAuth.getRedirectResult().catch(e => {
    if (e.code !== "auth/no-current-user") console.warn("Redirect:", e.code);
  });

  fbAuth.onAuthStateChanged(user => {
    clearTimeout(authTimeout);
    if (user) { bootUser(user); }
    else      { showAuthScreen(); }
  });
});
