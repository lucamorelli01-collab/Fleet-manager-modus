<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fleet Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ══ MD3 COLOR TOKENS (dark scheme) ═════════════════════════════════ */
    :root {
      --pri:       #A8C7FA;  --on-pri:      #0B3A73;
      --pri-con:   #1B5299;  --on-pri-con:  #D6E4FF;
      --sec:       #BBC4D2;  --on-sec:      #253040;
      --sec-con:   #384758;  --on-sec-con:  #D7E3F7;
      --ter:       #D4BBDF;  --on-ter:      #3A2746;
      --err:       #FFB4AB;  --on-err:      #680005;
      --err-con:   #93000A;
      --suc:       #72D9A0;
      --warn:      #FFC87A;

      --bg:        #0F1117;
      --sur:       #0F1117;  --on-sur:      #E3E2E8;
      --sur-var:   #45474F;  --on-sur-var:  #C5C6D0;
      --out:       #8F9099;  --out-var:     #45474F;

      --s0:  #0B0D12;   /* surface-container-lowest  */
      --s1:  #191C21;   /* surface-container-low     */
      --s2:  #1D2026;   /* surface-container         */
      --s3:  #282A30;   /* surface-container-high    */
      --s4:  #323539;   /* surface-container-highest */

      --drawer: 272px;
      --rail:   80px;
      --topbar: 60px;
      --radius-xl: 28px;
      --radius-l:  16px;
      --radius-m:  12px;
      --radius-s:  8px;
      --radius-full: 100px;

      --e1: 0 1px 3px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.2);
      --e2: 0 2px 6px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.25);
      --e3: 0 4px 12px rgba(0,0,0,.35),0 2px 4px rgba(0,0,0,.2);
      --ease: cubic-bezier(.2,0,0,1);
    }

    /* ══ RESET ════════════════════════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg); color:var(--on-sur);
      font-family:'DM Sans',system-ui,sans-serif;
      font-size:14px; line-height:1.5;
      min-height:100vh; overflow-x:hidden;
    }
    input,select,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--out-var);border-radius:2px}

    /* ══ SHELL ════════════════════════════════════════════════════════════ */
    #app-shell{display:flex;min-height:100vh}

    /* ══ SCRIM ════════════════════════════════════════════════════════════ */
    #nav-scrim{
      position:fixed;inset:0;background:rgba(0,0,0,.55);
      z-index:299;opacity:0;pointer-events:none;
      transition:opacity .3s var(--ease);
    }
    #nav-scrim.visible{opacity:1;pointer-events:all}

    /* ══ DRAWER ═══════════════════════════════════════════════════════════ */
    #nav-drawer{
      position:fixed;left:0;top:0;bottom:0;
      width:var(--drawer);
      background:var(--s1);
      z-index:300;
      display:flex;flex-direction:column;
      transform:translateX(-100%);
      transition:transform .3s var(--ease),width .3s var(--ease);
      overflow:hidden;will-change:transform;
    }
    #nav-drawer.open{transform:translateX(0);box-shadow:var(--e3)}

    /* desktop: rail always visible, expands on hover/toggle */
    @media(min-width:1024px){
      #nav-drawer{transform:translateX(0);width:var(--rail);border-right:1px solid var(--out-var)}
      #nav-drawer.expanded{width:var(--drawer);box-shadow:var(--e2)}
      #nav-scrim{display:none}
      #shell-main{margin-left:var(--rail);transition:margin-left .3s var(--ease)}
      #shell-main.drawer-expanded{margin-left:var(--drawer)}
      .nav-label,.drawer-wordmark,.drawer-fleet-name,.drawer-section{
        opacity:0;pointer-events:none;width:0;overflow:hidden;white-space:nowrap;
        transition:opacity .2s,width .2s;
      }
      #nav-drawer.expanded .nav-label,
      #nav-drawer.expanded .drawer-wordmark,
      #nav-drawer.expanded .drawer-fleet-name,
      #nav-drawer.expanded .drawer-section{
        opacity:1;pointer-events:auto;width:auto;
      }
    }
    @media(max-width:1023px){
      #shell-main{margin-left:0}
    }

    /* drawer header */
    .drawer-header{
      display:flex;align-items:center;gap:12px;
      padding:14px 14px 10px;min-height:var(--topbar);flex-shrink:0;
      border-bottom:1px solid var(--out-var);
    }
    .drawer-icon{
      width:40px;height:40px;border-radius:var(--radius-m);
      background:var(--pri-con);color:var(--on-pri-con);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .drawer-wordmark{font-size:15px;font-weight:700;color:var(--on-sur);letter-spacing:.5px}
    .drawer-fleet-name{font-size:11px;color:var(--on-sur-var);margin-top:1px;max-width:180px;overflow:hidden;text-overflow:ellipsis}

    /* drawer nav items */
    .drawer-section{
      font-size:11px;font-weight:600;letter-spacing:1px;
      color:var(--on-sur-var);text-transform:uppercase;
      padding:16px 16px 4px;
    }
    .nav-item{
      display:flex;align-items:center;gap:14px;
      height:52px;border-radius:var(--radius-full);
      margin:2px 8px;padding:0 16px;
      cursor:pointer;border:none;background:none;
      color:var(--on-sur-var);font-size:14px;font-weight:500;
      text-align:left;width:calc(100% - 16px);
      transition:background .15s,color .15s;
      white-space:nowrap;overflow:hidden;
    }
    .nav-item:hover{background:rgba(226,226,233,.08)}
    .nav-item.active{background:var(--sec-con);color:var(--on-sec-con);font-weight:600}
    .nav-icon{font-size:20px;flex-shrink:0;width:24px;text-align:center;line-height:1}

    @media(min-width:1024px){
      #nav-drawer:not(.expanded) .nav-item{
        justify-content:center;padding:0;
        width:52px;border-radius:var(--radius-l);margin:2px auto;
      }
    }

    /* drawer footer */
    .drawer-footer{
      margin-top:auto;padding:8px;
      border-top:1px solid var(--out-var);
    }
    .user-tile{
      display:flex;align-items:center;gap:10px;
      padding:8px 10px;border-radius:var(--radius-m);
      cursor:pointer;transition:background .15s;overflow:hidden;
    }
    .user-tile:hover{background:var(--s3)}
    .user-avatar{
      width:36px;height:36px;border-radius:50%;
      background:var(--pri-con);color:var(--on-pri-con);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:700;overflow:hidden;
    }
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .user-name{font-size:13px;font-weight:600;color:var(--on-sur);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role{font-size:11px;color:var(--on-sur-var)}

    /* drawer action btns (bottom) */
    .drawer-actions{display:flex;flex-direction:column;gap:2px;padding:4px 8px}
    .drawer-action-btn{
      display:flex;align-items:center;gap:14px;
      height:44px;border-radius:var(--radius-full);
      padding:0 16px;cursor:pointer;border:none;background:none;
      color:var(--on-sur-var);font-size:13px;font-weight:500;
      text-align:left;width:100%;
      transition:background .15s,color .15s;white-space:nowrap;overflow:hidden;
    }
    .drawer-action-btn:hover{background:rgba(226,226,233,.08)}
    @media(min-width:1024px){
      #nav-drawer:not(.expanded) .drawer-action-btn{
        justify-content:center;padding:0;
        width:52px;border-radius:var(--radius-l);margin:0 auto;
      }
    }

    /* ══ MAIN SHELL ═══════════════════════════════════════════════════════ */
    #shell-main{flex:1;display:flex;flex-direction:column;min-width:0}

    /* ══ TOPBAR ═══════════════════════════════════════════════════════════ */
    #topbar{
      position:sticky;top:0;z-index:200;
      background:var(--s2);
      height:var(--topbar);
      display:flex;align-items:center;gap:4px;
      padding:0 8px;
      border-bottom:1px solid var(--out-var);
    }
    .topbar-icon-btn{
      width:44px;height:44px;border-radius:50%;border:none;
      background:none;color:var(--on-sur-var);
      cursor:pointer;font-size:20px;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s;flex-shrink:0;
    }
    .topbar-icon-btn:hover{background:var(--s4)}
    #topbar-title{
      flex:1;font-size:18px;font-weight:600;color:var(--on-sur);
      padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    #topbar-actions{display:flex;align-items:center;gap:2px}
    #saving-indicator{
      font-size:12px;color:var(--suc);font-weight:500;
      padding:0 8px;display:none;align-items:center;gap:6px;
    }
    #saving-indicator.visible{display:flex}

    /* ══ CONTENT ══════════════════════════════════════════════════════════ */
    #main-content{
      flex:1;padding:24px;
      max-width:960px;width:100%;margin:0 auto;
    }
    @media(max-width:600px){#main-content{padding:12px}}

    /* ══ PAGE HEADER ══════════════════════════════════════════════════════ */
    .page-header{
      display:flex;align-items:flex-start;justify-content:space-between;
      margin-bottom:24px;flex-wrap:wrap;gap:12px;
    }
    .page-title{font-size:22px;font-weight:700;color:var(--on-sur);letter-spacing:-.3px}
    .page-subtitle{font-size:13px;color:var(--on-sur-var);margin-top:3px}

    /* ══ CARDS ════════════════════════════════════════════════════════════ */
    .card{background:var(--s2);border-radius:var(--radius-l);padding:16px}
    .card-filled{background:var(--s3);border-radius:var(--radius-l);padding:16px}
    .card-outlined{background:var(--sur);border-radius:var(--radius-l);padding:16px;border:1px solid var(--out-var)}

    /* stat cards */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px}
    .stat-card{
      background:var(--s2);border-radius:var(--radius-l);padding:20px 18px;
      border:1px solid var(--out-var);
      transition:background .15s;
    }
    .stat-icon{font-size:26px;margin-bottom:10px}
    .stat-value{font-size:30px;font-weight:700;color:var(--on-sur);line-height:1;font-family:'DM Mono',monospace}
    .stat-label{font-size:12px;color:var(--on-sur-var);margin-top:5px;font-weight:500;letter-spacing:.3px}

    /* vehicle cards */
    .v-card{
      background:var(--s2);border-radius:var(--radius-l);padding:18px;
      cursor:pointer;transition:background .2s,box-shadow .2s;
      border:1px solid var(--out-var);position:relative;overflow:hidden;
    }
    .v-card::before{
      content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      background:var(--pri-con);opacity:0;transition:opacity .2s;
    }
    .v-card:hover{background:var(--s3);box-shadow:var(--e2)}
    .v-card:hover::before{opacity:1}
    .v-card.urgent::before{background:var(--err);opacity:1}
    .v-card.urgent{border-color:rgba(255,180,171,.2)}
    .v-targa{font-size:19px;font-weight:700;color:var(--on-sur);letter-spacing:2.5px;font-family:'DM Mono',monospace}
    .v-modello{font-size:13px;color:var(--on-sur-var);margin-top:3px}
    .v-km{font-size:19px;font-weight:600;color:var(--pri);font-family:'DM Mono',monospace}
    .v-km-label{font-size:11px;color:var(--on-sur-var)}

    /* ══ BADGE / CHIP ═════════════════════════════════════════════════════ */
    .badge{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 10px;border-radius:var(--radius-s);
      font-size:11px;font-weight:700;letter-spacing:.4px;
    }
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 14px;border-radius:var(--radius-full);
      font-size:13px;font-weight:500;
      border:1px solid var(--out-var);color:var(--on-sur-var);
      background:none;cursor:pointer;transition:background .15s;
    }
    .chip:hover{background:var(--s3)}
    .chip.active{background:var(--sec-con);color:var(--on-sec-con);border-color:transparent}

    /* ══ BUTTONS ══════════════════════════════════════════════════════════ */
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:9px 22px;border-radius:var(--radius-full);border:none;
      font-size:14px;font-weight:600;cursor:pointer;
      background:var(--pri);color:var(--on-pri);
      transition:box-shadow .15s,opacity .15s;letter-spacing:.1px;
      white-space:nowrap;
    }
    .btn:hover{box-shadow:var(--e1);opacity:.92}
    .btn:disabled{opacity:.38;cursor:not-allowed}
    .btn-tonal{background:var(--sec-con);color:var(--on-sec-con)}
    .btn-outlined{background:transparent;border:1px solid var(--out);color:var(--pri)}
    .btn-ghost{background:transparent;color:var(--on-sur-var);border:1px solid var(--out-var)}
    .btn-danger{background:rgba(255,180,171,.12);color:var(--err);border:1px solid rgba(255,180,171,.25)}
    .btn-green{background:rgba(114,217,160,.12);color:var(--suc);border:1px solid rgba(114,217,160,.25)}
    .btn-yellow{background:rgba(255,200,122,.1);color:var(--warn);border:1px solid rgba(255,200,122,.25)}

    /* FAB */
    .fab{
      position:fixed;bottom:24px;right:24px;
      border-radius:var(--radius-l);border:none;cursor:pointer;
      background:var(--pri-con);color:var(--on-pri-con);
      box-shadow:var(--e3);z-index:100;
      display:flex;align-items:center;justify-content:center;
      gap:8px;font-size:14px;font-weight:600;
      padding:0 20px;height:56px;
      transition:box-shadow .2s,transform .15s;
    }
    .fab:hover{box-shadow:var(--e3);transform:scale(1.03)}
    .fab-icon{font-size:22px}
    @media(max-width:600px){.fab{bottom:16px;right:16px}}

    /* ══ FORMS ════════════════════════════════════════════════════════════ */
    .field{margin-bottom:16px}
    .field label{
      display:block;font-size:11px;font-weight:600;
      color:var(--on-sur-var);margin-bottom:6px;
      text-transform:uppercase;letter-spacing:.8px;
    }
    .field input,.field select,.field textarea{
      width:100%;background:var(--s3);
      border:1px solid var(--out-var);
      border-radius:var(--radius-s);padding:10px 14px;
      color:var(--on-sur);font-size:14px;outline:none;
      transition:border-color .15s;
    }
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pri)}
    .field textarea{resize:vertical;line-height:1.6;min-height:80px}

    /* ══ MODAL ════════════════════════════════════════════════════════════ */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.65);
      display:flex;align-items:center;justify-content:center;
      z-index:1000;padding:16px;backdrop-filter:blur(3px);
    }
    .modal{
      background:var(--s1);border-radius:var(--radius-xl);
      padding:26px;width:100%;max-width:480px;
      max-height:90vh;overflow-y:auto;
      box-shadow:var(--e3);
    }
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-header h3{font-size:20px;font-weight:700;color:var(--on-sur)}
    .modal-close{
      width:40px;height:40px;border-radius:50%;border:none;
      background:none;color:var(--on-sur-var);font-size:20px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .15s;
    }
    .modal-close:hover{background:var(--s3)}

    /* ══ TABS ═════════════════════════════════════════════════════════════ */
    .tabs{
      display:flex;gap:4px;margin-bottom:20px;
      overflow-x:auto;padding-bottom:2px;
    }
    .tabs::-webkit-scrollbar{height:0}
    .tab{
      padding:8px 16px;border:none;cursor:pointer;
      font-size:13px;font-weight:500;border-radius:var(--radius-s);
      background:none;color:var(--on-sur-var);
      white-space:nowrap;transition:background .15s,color .15s;
    }
    .tab:hover{background:var(--s3)}
    .tab.active{background:var(--sec-con);color:var(--on-sec-con);font-weight:600}

    /* ══ LIST ROWS ════════════════════════════════════════════════════════ */
    .row{background:var(--s2);border-radius:var(--radius-m);padding:14px 16px;margin-bottom:8px;border:1px solid var(--out-var)}
    .row-flex{display:flex;justify-content:space-between;align-items:center}

    /* ══ SPINNER ══════════════════════════════════════════════════════════ */
    .spinner{
      display:inline-block;border-radius:50%;
      border:3px solid rgba(168,199,250,.15);
      border-top-color:var(--pri);
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ══ SNACKBAR ═════════════════════════════════════════════════════════ */
    #alert-banner{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      padding:12px 24px;border-radius:var(--radius-s);
      font-size:14px;font-weight:500;z-index:2000;display:none;
      min-width:220px;text-align:center;box-shadow:var(--e3);
      white-space:nowrap;
    }

    /* ══ AUTH ═════════════════════════════════════════════════════════════ */
    .auth-screen{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;min-height:100vh;padding:20px;
    }
    .auth-box{
      background:var(--s1);border-radius:var(--radius-xl);
      padding:32px;width:100%;max-width:400px;box-shadow:var(--e2);
    }
    .auth-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--out-var)}
    .auth-tab{
      flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;
      cursor:pointer;color:var(--on-sur-var);border:none;background:none;
      border-bottom:2px solid transparent;transition:.15s;
    }
    .auth-tab.active{color:var(--pri);border-bottom-color:var(--pri)}
    .auth-divider{
      display:flex;align-items:center;gap:10px;
      margin:16px 0;color:var(--on-sur-var);font-size:12px;
    }
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--out-var)}
    .auth-error{color:var(--err);font-size:12px;margin-top:6px;min-height:16px}
    .btn-google{
      width:100%;padding:12px;border-radius:var(--radius-full);
      border:1px solid var(--out);background:none;
      color:var(--on-sur);font-size:14px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:10px;transition:background .15s;
    }
    .btn-google:hover{background:var(--s3)}

    /* ══ MISC ══════════════════════════════════════════════════════════════ */
    #user-chip{display:none}
    .divider{height:1px;background:var(--out-var);margin:12px 0}
    .viewer-badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 10px;border-radius:var(--radius-s);
      font-size:11px;font-weight:700;
      background:rgba(255,200,122,.1);color:var(--warn);
      border:1px solid rgba(255,200,122,.25);
    }

    /* checklist */
    .checklist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-top:12px}
    .checklist-item{
      display:flex;align-items:center;gap:10px;
      background:var(--s2);border:1px solid var(--out-var);
      border-radius:var(--radius-m);padding:10px 14px;cursor:pointer;
      transition:border-color .15s,background .15s;
    }
    .checklist-item:hover{background:var(--s3)}
    .checklist-item.checked{border-color:rgba(114,217,160,.35);background:rgba(114,217,160,.06)}
    .checklist-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--suc);cursor:pointer;flex-shrink:0}
    .checklist-item label{color:var(--on-sur);font-size:13px;cursor:pointer;flex:1}
    .checklist-item.checked label{color:var(--on-sur-var);text-decoration:line-through}

    /* urgency strip on scadenze rows */
    .scad-row{position:relative;padding-left:20px}
    .scad-row::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:2px;background:var(--out-var)}
    .scad-row.red::before{background:var(--err)}
    .scad-row.orange::before{background:var(--warn)}
    .scad-row.green::before{background:var(--suc)}
  </style>
</head>
<body>

<!-- SNACKBAR -->
<div id="alert-banner"></div>

<!-- NAV SCRIM (mobile overlay) -->
<div id="nav-scrim" onclick="closeDrawer()"></div>

<!-- ROOT -->
<div id="app">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
    <div class="spinner" style="width:40px;height:40px"></div>
    <div style="color:var(--pri);font-size:15px;font-weight:500">Caricamento...</div>
    <div style="color:var(--on-sur-var);font-size:12px;opacity:.5">Fleet Manager</div>
  </div>

// ═══════════════════════════════════════════════════════════════════════════
// UTILS

function daysUntil(d) {
  if (!d) return 9999;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(d) - t) / 86400000);
}
function fmtDate(d) {
  if (!d) return "—";
  const [y,m,dd] = d.split("-"); return `${dd}/${m}/${y}`;
}
function urgColor(n) {
  if (n < 0)   return "var(--err)";
  if (n <= 14) return "#ff6b35";
  if (n <= 30) return "var(--warn)";
  return "var(--suc)";
}
function urgLabel(n) {
  if (n < 0)   return "SCADUTA";
  if (n <= 14) return "URGENTE";
  if (n <= 30) return "IN SCADENZA";
  return "OK";
}
function badge(days) {
  if (days < 0)   return `<span class="badge" style="background:rgba(255,180,171,.15);color:var(--err)">SCADUTA</span>`;
  if (days <= 7)  return `<span class="badge" style="background:rgba(255,180,171,.12);color:var(--err)">${days}gg</span>`;
  if (days <= 30) return `<span class="badge" style="background:rgba(255,200,122,.12);color:var(--warn)">${days}gg</span>`;
  if (days <= 90) return `<span class="badge" style="background:rgba(168,199,250,.1);color:var(--pri)">${days}gg</span>`;
  return `<span class="badge" style="background:rgba(114,217,160,.1);color:var(--suc)">${days}gg</span>`;
}
function urgColor(n) {
  if (n < 0)   return "var(--err)";
  if (n <= 14) return "#ff6b35";
  if (n <= 30) return "var(--warn)";
  return "var(--suc)";
}
function urgLabel(n) {
  if (n < 0)   return "SCADUTA";
  if (n <= 14) return "URGENTE";
  if (n <= 30) return "IN SCADENZA";
  return "OK";
}
function badge(days) {
  const c = urgColor(days), l = urgLabel(days);
  return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}55">${l}</span>`;
}
function showAlert(msg, ok=true) {
  const el = document.getElementById("alert-banner");
  el.textContent = msg;
  el.style.background = ok ? "var(--s4)" : "var(--err-con)";
  el.style.color      = ok ? "var(--on-sur)" : "var(--err)";
  el.style.border     = "none";
  el.style.display    = "block";
  setTimeout(() => el.style.display = "none", 3500);
}
function canEdit() {
  if (CURRENT_FLEET_ROLE === "viewer") {
    showAlert("👁 Sei in modalità sola lettura", false);
    return false;
  }
  return true;
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ═══════════════════════════════════════════════════════════════════════════
// EXCEL EXPORT
// ═══════════════════════════════════════════════════════════════════════════
function exportExcel() {
  const { vehicles, scadenze, manutenzioni, kmLog, gomme } = DATA;
  const wb = XLSX.utils.book_new();

  const hStyle = { font:{bold:true,color:{rgb:"FFFFFF"}}, fill:{patternType:"solid",fgColor:{rgb:"1A3A6B"}}, alignment:{horizontal:"center"} };
  function styleHeaders(ws) {
    const range = XLSX.utils.decode_range(ws["!ref"]);
    for (let C = range.s.c; C <= range.e.c; C++) {
      const a = XLSX.utils.encode_cell({r:0,c:C});
      if (ws[a]) ws[a].s = hStyle;
    }
  }

  const wF = XLSX.utils.aoa_to_sheet([
    ["ID","Targa","Modello","Anno","Km attuali","Note"],
    ...vehicles.map(v=>[v.id,v.targa,v.modello,v.anno,v.km,v.note||""])
  ]);
  wF["!cols"]=[{wch:6},{wch:12},{wch:20},{wch:8},{wch:14},{wch:40}]; styleHeaders(wF);
  XLSX.utils.book_append_sheet(wb, wF, "Furgoni");

  const wS = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Tipo scadenza","Data scadenza","Note"],
    ...scadenze.map(s=>{ const v=vehicles.find(x=>x.id===s.vehicleId)||{}; return [s.id,v.modello||"",v.targa||"",s.tipo,s.scadenza,s.note||""]; })
  ]);
  wS["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:18},{wch:16},{wch:30}]; styleHeaders(wS);
  XLSX.utils.book_append_sheet(wb, wS, "Scadenze");

  const wM = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Tipo","Descrizione","Data","Km","Costo (€)"],
    ...manutenzioni.map(m=>{ const v=vehicles.find(x=>x.id===m.vehicleId)||{}; return [m.id,v.modello||"",v.targa||"",m.tipo,m.descrizione,m.data,m.km,m.costo||""]; })
  ]);
  wM["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:14},{wch:30},{wch:12},{wch:10},{wch:12}]; styleHeaders(wM);
  XLSX.utils.book_append_sheet(wb, wM, "Manutenzioni");

  const wK = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Km rilevati","Data","Note"],
    ...kmLog.map(k=>{ const v=vehicles.find(x=>x.id===k.vehicleId)||{}; return [k.id,v.modello||"",v.targa||"",k.km,k.data,k.note||""]; })
  ]);
  wK["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:14},{wch:12},{wch:30}]; styleHeaders(wK);
  XLSX.utils.book_append_sheet(wb, wK, "Registro KM");

  const wG = XLSX.utils.aoa_to_sheet([
    ["ID","Furgone","Targa","Tipo gomme","Data montaggio","Marca","Note"],
    ...gomme.map(g=>{ const v=vehicles.find(x=>x.id===g.vehicleId)||{}; return [g.id,v.modello||"",v.targa||"",g.tipo,g.data,g.marca||"",g.note||""]; })
  ]);
  wG["!cols"]=[{wch:6},{wch:20},{wch:12},{wch:14},{wch:16},{wch:16},{wch:30}]; styleHeaders(wG);
  XLSX.utils.book_append_sheet(wb, wG, "Cambio Gomme");

  XLSX.writeFile(wb, `fleet_backup_${new Date().toISOString().split("T")[0]}.xlsx`);
  showAlert("✅ Backup Excel esportato!");
}

// ═══════════════════════════════════════════════════════════════════════════
// EXCEL IMPORT
// ═══════════════════════════════════════════════════════════════════════════
function importExcel(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ps = (n) => { const ws=wb.Sheets[n]; return ws ? XLSX.utils.sheet_to_json(ws,{defval:""}) : []; };

      const vehicles = ps("Furgoni").map(r=>({
        id:Number(r["ID"]), targa:String(r["Targa"]||"").toUpperCase(),
        modello:String(r["Modello"]||""), anno:Number(r["Anno"])||0,
        km:Number(r["Km attuali"])||0, note:String(r["Note"]||"")
      }));
      const byTarga = {}; vehicles.forEach(v=>{ byTarga[v.targa]=v.id; });

      const scadenze = ps("Scadenze").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        tipo:String(r["Tipo scadenza"]||""), scadenza:String(r["Data scadenza"]||""), note:String(r["Note"]||"")
      }));
      const manutenzioni = ps("Manutenzioni").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        tipo:String(r["Tipo"]||""), descrizione:String(r["Descrizione"]||""),
        data:String(r["Data"]||""), km:Number(r["Km"])||0, costo:Number(r["Costo (€)"])||0
      }));
      const kmLog = ps("Registro KM").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        km:Number(r["Km rilevati"])||0, data:String(r["Data"]||""), note:String(r["Note"]||"")
      }));
      const gomme = ps("Cambio Gomme").map((r,i)=>({
        id:Number(r["ID"])||i+1, vehicleId:byTarga[String(r["Targa"]||"").toUpperCase()]||0,
        tipo:String(r["Tipo gomme"]||""), data:String(r["Data montaggio"]||""),
        marca:String(r["Marca"]||""), note:String(r["Note"]||"")
      }));
      const mx = arr => arr.length>0 ? Math.max(...arr.map(x=>x.id))+1 : 1;

      DATA = { vehicles, scadenze, manutenzioni, kmLog, gomme,
        nextId:{scadenza:mx(scadenze),manutenzione:mx(manutenzioni),km:mx(kmLog),gomma:mx(gomme)} };
      saveData();
      render();
      showAlert(`✅ Importati ${vehicles.length} furgoni`);
    } catch(err) {
      showAlert("❌ File non valido", false);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER ENGINE

function render() {
  if (!DATA) DATA = defaultData();
  const toArr = v => { if (!v) return []; if (Array.isArray(v)) return v; return Object.values(v).filter(x => x && typeof x === 'object'); };
  DATA.vehicles     = toArr(DATA.vehicles);
  DATA.scadenze     = toArr(DATA.scadenze);
  DATA.manutenzioni = toArr(DATA.manutenzioni);
  DATA.kmLog        = toArr(DATA.kmLog);
  DATA.gomme        = toArr(DATA.gomme);
  if (!DATA.nextId) DATA.nextId = {scadenza:10,manutenzione:1,km:1,gomma:1};

  if (!document.getElementById('app-shell')) {
    buildShell();
  }
  updateDrawer();
  updateTopbar();
  renderContent();
}

/* ── Drawer open/close ────────────────────────────────────────── */
function openDrawer() {
  document.getElementById('nav-drawer')?.classList.add('open');
  document.getElementById('nav-scrim')?.classList.add('visible');
  document.getElementById('shell-main')?.classList.add('drawer-expanded');
  document.getElementById('nav-drawer')?.classList.add('expanded');
}
function closeDrawer() {
  const d = document.getElementById('nav-drawer');
  const s = document.getElementById('nav-scrim');
  const m = document.getElementById('shell-main');
  if (window.innerWidth >= 1024) {
    d?.classList.remove('expanded');
    m?.classList.remove('drawer-expanded');
  } else {
    d?.classList.remove('open');
    s?.classList.remove('visible');
  }
}
function toggleDrawer() {
  const d = document.getElementById('nav-drawer');
  if (!d) return;
  if (window.innerWidth >= 1024) {
    d.classList.toggle('expanded');
    document.getElementById('shell-main')?.classList.toggle('drawer-expanded');
  } else {
    if (d.classList.contains('open')) closeDrawer();
    else openDrawer();
  }
}

  if (cont) cont.innerHTML = html;

  updateDrawer();

function renderDashboard() {
  const today = new Date();
  const scad30  = DATA.scadenze.filter(s => !s.done && daysUntil(s.scadenza) <= 30);
  const scad90  = DATA.scadenze.filter(s => !s.done && daysUntil(s.scadenza) <= 90);
  const scadScad= DATA.scadenze.filter(s => !s.done && daysUntil(s.scadenza) < 0);
  const totalKm = DATA.vehicles.reduce((a,v) => a + (v.km||0), 0);

  const statCards = [
    { icon:'🚐', value: DATA.vehicles.length, label:'Veicoli', color:'var(--pri)' },
    { icon:'⚠️', value: scad30.length,  label:'Scadenze entro 30gg', color:'var(--warn)' },
    { icon:'🔴', value: scadScad.length, label:'Scadute',  color:'var(--err)' },
    { icon:'📍', value: totalKm.toLocaleString('it-IT'), label:'Km totali', color:'var(--suc)' },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-value" style="color:${s.color}">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');

  // Urgency list
  const urgList = DATA.scadenze
    .filter(s => !s.done && daysUntil(s.scadenza) <= 30)
    .sort((a,b) => daysUntil(a.scadenza) - daysUntil(b.scadenza))
    .slice(0,8)
    .map(s => {
      const v = DATA.vehicles.find(x => x.id === s.vehicleId);
      const d = daysUntil(s.scadenza);
      const b = badge(d);
      return `<div class="row row-flex" style="cursor:pointer" onclick="selectVehicle(${s.vehicleId})">
        <div>
          <div style="font-weight:600;color:var(--on-sur);font-size:13px">${esc(s.tipo)}</div>
          <div style="color:var(--on-sur-var);font-size:12px;margin-top:2px">${v ? esc(v.targa)+' · '+esc(v.modello) : ''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">${b}</div>
      </div>`;
    }).join('') || `<div style="color:var(--on-sur-var);text-align:center;padding:24px;font-size:13px">✅ Nessuna scadenza urgente</div>`;

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">Panoramica flotta · ${DATA.vehicles.length} veicoli</div>
      </div>
    </div>
    <div class="stat-grid">${statCards}</div>
    <div style="margin-bottom:12px;font-size:13px;font-weight:600;color:var(--on-sur-var);letter-spacing:.5px;text-transform:uppercase">⚠️ Prossime scadenze</div>
    ${urgList}`;
}


function renderFlotta() {
  const cards = DATA.vehicles.map(v => {
    const sv   = DATA.scadenze.filter(s => s.vehicleId === v.id && !s.done);
    const minD = sv.length > 0 ? Math.min(...sv.map(s => daysUntil(s.scadenza))) : 9999;
    const urgent = minD <= 7;
    const badges = sv
      .sort((a,b) => daysUntil(a.scadenza)-daysUntil(b.scadenza))
      .slice(0,3).map(s => badge(daysUntil(s.scadenza))).join(' ');
    return `<div class="v-card${urgent?' urgent':''}" onclick="selectVehicle(${v.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div class="v-targa">${esc(v.targa)}</div>
          <div class="v-modello">${esc(v.modello)} · ${v.anno}</div>
        </div>
        <div style="text-align:right">
          <div class="v-km">${v.km.toLocaleString('it-IT')}</div>
          <div class="v-km-label">km</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">

let KM_CHART_MODE = "mese";

function setKmChartMode(mode) {
  KM_CHART_MODE = mode;
  // Aggiorna solo il grafico senza ricostruire tutto il DOM
  const container = document.getElementById("km-chart-container");
  if (container) {
    const vid = SELECTED_VEHICLE ? SELECTED_VEHICLE.id : null;
    if (vid !== null) {
      container.outerHTML = buildKmGrafico(DATA.kmLog.filter(k=>k.vehicleId===vid));
    }
  }
}

function buildKmGrafico(items) {
  if (items.length === 0) return `<div id="km-chart-container"></div>`;

  const sorted = [...items].sort((a,b)=>new Date(a.data)-new Date(b.data));

  // Raggruppa: prende il km massimo per ogni periodo
  const groups = {};
  sorted.forEach(k => {
    const d = new Date(k.data);
    const key = KM_CHART_MODE === "mese"
      ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`
      : `${d.getFullYear()}`;
    if (!(key in groups) || k.km > groups[key]) groups[key] = k.km;
  });

  const keys = Object.keys(groups).sort();

  // Calcola delta: km percorsi in ogni periodo rispetto al precedente
  // Se un solo periodo, mostra i km totali come valore assoluto
  let bars = "";
  if (keys.length === 1) {
    // Un solo periodo: mostra valore assoluto
    const label = KM_CHART_MODE === "mese"
      ? keys[0].slice(5) + "/" + keys[0].slice(2,4)
      : keys[0];
    bars = `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
      <span style="color:var(--on-sur-var);font-size:9px;font-weight:600">${Number(groups[keys[0]]).toLocaleString("it-IT")}</span>
      <div style="width:40px;height:110px;background:var(--pri);border-radius:4px 4px 0 0;min-height:3px"></div>
      <span style="color:var(--on-sur-var);font-size:9px;white-space:nowrap">${label}</span>
    </div>`;
  } else {
    const deltas = keys.map((k,i) => {
      if (i === 0) return null;
      return { label: k, val: Math.max(0, groups[k] - groups[keys[i-1]]) };
    }).filter(Boolean);

    const maxVal = Math.max(...deltas.map(d=>d.val), 1);
    const barWidth = Math.max(24, Math.min(52, Math.floor(540 / deltas.length) - 6));

    bars = deltas.map(d => {
      const h = Math.max(3, Math.round((d.val / maxVal) * 110));
      const isMax = d.val === maxVal;
      const color = isMax ? "var(--pri)" : "var(--pri)66";
      const label = KM_CHART_MODE === "mese"
        ? d.label.slice(5) + "/" + d.label.slice(2,4)
        : d.label;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
        <span style="color:${isMax?'var(--on-sur)':'var(--on-sur-var)'};font-size:9px;font-weight:${isMax?700:400}">${Number(d.val).toLocaleString("it-IT")}</span>
        <div style="width:${barWidth}px;height:${h}px;background:${color};border-radius:4px 4px 0 0;"
             title="${label}: ${Number(d.val).toLocaleString("it-IT")} km"></div>
        <span style="color:var(--on-sur-var);font-size:9px;white-space:nowrap">${label}</span>
      </div>`;
    }).join("");
  }

  return `<div id="km-chart-container" style="background:var(--s2);border:1px solid var(--out-var);border-radius:10px;padding:16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:var(--on-sur);font-size:13px;font-weight:700">📈 KM PERCORSI</span>
      <div style="display:flex;gap:4px">
        <button onclick="setKmChartMode('mese')"
          style="font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid var(--pri);
                 background:${KM_CHART_MODE==='mese'?'var(--pri)':'transparent'};
                 color:${KM_CHART_MODE==='mese'?'#fff':'var(--pri)'}">Per mese</button>
        <button onclick="setKmChartMode('anno')"
          style="font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid var(--pri);
                 background:${KM_CHART_MODE==='anno'?'var(--pri)':'transparent'};
                 color:${KM_CHART_MODE==='anno'?'#fff':'var(--pri)'}">Per anno</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <div style="display:flex;align-items:flex-end;gap:6px;min-height:140px;padding:4px 0 0 0;min-width:fit-content">
        ${bars}
      </div>
    </div>
  </div>`;
}

const CHECKLIST_VOCI = [
  "Verifica liquidi (olio freni, raffreddamento, motore, lavacristalli)",
  "Pressione pneumatici",
  "Olio motore",
  "Filtro olio",
  "Filtro aria",
  "Filtro antipolline",
  "Candele / Candelette",
  "Olio cambio / Differenziale",
  "Antigelo",
  "Ammortizzatori anteriori",
  "Ammortizzatori posteriori",
  "Cinghia distribuzione",
  "Liquido freni",
  "Pastiglie freni anteriori",
  "Tamburi freni posteriori",
  "Dischi freni anteriori",
  "GOMME – sostituzione",
  "Equilibratura",
  "Convergenza",
  "Inversione gomme",
  "Altro"
];

function renderChecklistTab(v) {
  const checklist = (v.checklist || []);
  // Normalizza struttura: accetta sia numeri (vecchi) che oggetti {i, data}
  const normalize = (c) => typeof c === "object" ? c : { i: c, data: new Date().toISOString().split("T")[0] };
  const checkedMap = {};
  checklist.forEach(c => { const n = normalize(c); checkedMap[n.i] = n.data; });

  const items = CHECKLIST_VOCI.map((voce, i) => {
    const isChecked = i in checkedMap;
    const dataVal = checkedMap[i] || "";
    return `<div class="checklist-item ${isChecked?'checked':''}" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div style="display:flex;align-items:center;gap:10px;width:100%" onclick="toggleChecklist(${v.id},${i})">
        <input type="checkbox" ${isChecked?'checked':''} onclick="event.stopPropagation();toggleChecklist(${v.id},${i})"/>
        <label style="flex:1">${esc(voce)}</label>
      </div>
      ${isChecked ? `<input type="date" value="${dataVal}"
        style="background:var(--s0);border:1px solid var(--out-var);border-radius:5px;padding:3px 8px;color:var(--on-sur-var);font-size:11px;width:100%;outline:none"
        onclick="event.stopPropagation()"
        onchange="setChecklistDate(${v.id},${i},this.value)"/>` : ""}
    </div>`;
  }).join("");

  const done = Object.keys(checkedMap).length;
  const pct = Math.round(done / CHECKLIST_VOCI.length * 100);
  const barColor = pct === 100 ? "var(--suc)" : pct >= 50 ? "var(--warn)" : "var(--pri)";

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:var(--on-sur-var);font-size:13px">${done} / ${CHECKLIST_VOCI.length} completate</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="width:100px;height:6px;background:var(--out-var);border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px;transition:width .3s"></div>
        </div>
        <span style="color:${barColor};font-size:12px;font-weight:700">${pct}%</span>
        <button class="btn" onclick="resetChecklist(${v.id})">🔄 Reset</button>
        <button class="btn btn-green" onclick="salvaChecklistInManutenzioni(${v.id})" title="Registra le voci spuntate come manutenzione">📋 Salva in manutenzioni</button>
      </div>
    </div>
    <div class="checklist-grid">${items}</div>`;
}

function toggleChecklist(vehicleId, index) {
  if (!canEdit()) return;
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  if (!v.checklist) v.checklist = [];
  const existing = v.checklist.findIndex(c => (typeof c === "object" ? c.i : c) === index);
  if (existing === -1) {
    const today = new Date().toISOString().split("T")[0];
    v.checklist.push({ i: index, data: today });
  } else {
    v.checklist.splice(existing, 1);
  }
  saveData();
  renderContent();
}

function setChecklistDate(vehicleId, index, dateVal) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v || !v.checklist) return;
  const existing = v.checklist.find(c => (typeof c === "object" ? c.i : c) === index);
  if (existing && typeof existing === "object") {
    existing.data = dateVal;
    saveData();
  }
}

function salvaChecklistInManutenzioni(vehicleId) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v || !v.checklist || v.checklist.length === 0) {
    showAlert("❌ Nessuna voce spuntata nella checklist", false); return;
  }
  const checked = v.checklist.map(c => typeof c === "object" ? c : { i: c, data: new Date().toISOString().split("T")[0] });
  const voci = checked.map(c => `• ${CHECKLIST_VOCI[c.i]} (${fmtDate(c.data)})`).join("\n");
  DATA.manutenzioni.push({
    id: DATA.nextId.manutenzione++,
    vehicleId,
    tipo: "Ordinaria",
    descrizione: "Checklist manutenzione",
    data: checked[0].data,
    km: v.km || 0,
    costo: 0,
    note: voci
  });
  saveData();
  showAlert("✅ Checklist salvata nelle manutenzioni!");
  renderContent();
}

function resetChecklist(vehicleId) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  v.checklist = [];
  saveData();
  renderContent();
}

function renderAllScadenze() {
  const active = DATA.scadenze

let KM_CHART_MODE = "mese";

function setKmChartMode(mode) {
  KM_CHART_MODE = mode;
  // Aggiorna solo il grafico senza ricostruire tutto il DOM
  const container = document.getElementById("km-chart-container");
  if (container) {
    const vid = SELECTED_VEHICLE ? SELECTED_VEHICLE.id : null;
    if (vid !== null) {
      container.outerHTML = buildKmGrafico(DATA.kmLog.filter(k=>k.vehicleId===vid));
    }
  }
}

function buildKmGrafico(items) {
  if (items.length === 0) return `<div id="km-chart-container"></div>`;

  const sorted = [...items].sort((a,b)=>new Date(a.data)-new Date(b.data));

  // Raggruppa: prende il km massimo per ogni periodo
  const groups = {};
  sorted.forEach(k => {
    const d = new Date(k.data);
    const key = KM_CHART_MODE === "mese"
      ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`
      : `${d.getFullYear()}`;
    if (!(key in groups) || k.km > groups[key]) groups[key] = k.km;
  });

  const keys = Object.keys(groups).sort();

  // Calcola delta: km percorsi in ogni periodo rispetto al precedente
  // Se un solo periodo, mostra i km totali come valore assoluto
  let bars = "";
  if (keys.length === 1) {
    // Un solo periodo: mostra valore assoluto
    const label = KM_CHART_MODE === "mese"
      ? keys[0].slice(5) + "/" + keys[0].slice(2,4)
      : keys[0];
    bars = `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
      <span style="color:var(--on-sur-var);font-size:9px;font-weight:600">${Number(groups[keys[0]]).toLocaleString("it-IT")}</span>
      <div style="width:40px;height:110px;background:var(--pri);border-radius:4px 4px 0 0;min-height:3px"></div>
      <span style="color:var(--on-sur-var);font-size:9px;white-space:nowrap">${label}</span>
    </div>`;
  } else {
    const deltas = keys.map((k,i) => {
      if (i === 0) return null;
      return { label: k, val: Math.max(0, groups[k] - groups[keys[i-1]]) };
    }).filter(Boolean);

    const maxVal = Math.max(...deltas.map(d=>d.val), 1);
    const barWidth = Math.max(24, Math.min(52, Math.floor(540 / deltas.length) - 6));

    bars = deltas.map(d => {
      const h = Math.max(3, Math.round((d.val / maxVal) * 110));
      const isMax = d.val === maxVal;
      const color = isMax ? "var(--pri)" : "var(--pri)66";
      const label = KM_CHART_MODE === "mese"
        ? d.label.slice(5) + "/" + d.label.slice(2,4)
        : d.label;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
        <span style="color:${isMax?'var(--on-sur)':'var(--on-sur-var)'};font-size:9px;font-weight:${isMax?700:400}">${Number(d.val).toLocaleString("it-IT")}</span>
        <div style="width:${barWidth}px;height:${h}px;background:${color};border-radius:4px 4px 0 0;"
             title="${label}: ${Number(d.val).toLocaleString("it-IT")} km"></div>
        <span style="color:var(--on-sur-var);font-size:9px;white-space:nowrap">${label}</span>
      </div>`;
    }).join("");
  }

  return `<div id="km-chart-container" style="background:var(--s2);border:1px solid var(--out-var);border-radius:10px;padding:16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:var(--on-sur);font-size:13px;font-weight:700">📈 KM PERCORSI</span>
      <div style="display:flex;gap:4px">
        <button onclick="setKmChartMode('mese')"
          style="font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid var(--pri);
                 background:${KM_CHART_MODE==='mese'?'var(--pri)':'transparent'};
                 color:${KM_CHART_MODE==='mese'?'#fff':'var(--pri)'}">Per mese</button>
        <button onclick="setKmChartMode('anno')"
          style="font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid var(--pri);
                 background:${KM_CHART_MODE==='anno'?'var(--pri)':'transparent'};
                 color:${KM_CHART_MODE==='anno'?'#fff':'var(--pri)'}">Per anno</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <div style="display:flex;align-items:flex-end;gap:6px;min-height:140px;padding:4px 0 0 0;min-width:fit-content">
        ${bars}
      </div>
    </div>
  </div>`;
}

function renderChecklistTab(v) {
  const checklist = (v.checklist || []);
  // Normalizza struttura: accetta sia numeri (vecchi) che oggetti {i, data}
  const normalize = (c) => typeof c === "object" ? c : { i: c, data: new Date().toISOString().split("T")[0] };
  const checkedMap = {};
  checklist.forEach(c => { const n = normalize(c); checkedMap[n.i] = n.data; });

  const items = CHECKLIST_VOCI.map((voce, i) => {
    const isChecked = i in checkedMap;
    const dataVal = checkedMap[i] || "";
    return `<div class="checklist-item ${isChecked?'checked':''}" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div style="display:flex;align-items:center;gap:10px;width:100%" onclick="toggleChecklist(${v.id},${i})">
        <input type="checkbox" ${isChecked?'checked':''} onclick="event.stopPropagation();toggleChecklist(${v.id},${i})"/>
        <label style="flex:1">${esc(voce)}</label>
      </div>
      ${isChecked ? `<input type="date" value="${dataVal}"
        style="background:var(--s0);border:1px solid var(--out-var);border-radius:5px;padding:3px 8px;color:var(--on-sur-var);font-size:11px;width:100%;outline:none"
        onclick="event.stopPropagation()"
        onchange="setChecklistDate(${v.id},${i},this.value)"/>` : ""}
    </div>`;
  }).join("");

  const done = Object.keys(checkedMap).length;
  const pct = Math.round(done / CHECKLIST_VOCI.length * 100);
  const barColor = pct === 100 ? "var(--suc)" : pct >= 50 ? "var(--warn)" : "var(--pri)";

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="color:var(--on-sur-var);font-size:13px">${done} / ${CHECKLIST_VOCI.length} completate</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="width:100px;height:6px;background:var(--out-var);border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px;transition:width .3s"></div>
        </div>
        <span style="color:${barColor};font-size:12px;font-weight:700">${pct}%</span>
        <button class="btn" onclick="resetChecklist(${v.id})">🔄 Reset</button>
        <button class="btn btn-green" onclick="salvaChecklistInManutenzioni(${v.id})" title="Registra le voci spuntate come manutenzione">📋 Salva in manutenzioni</button>
      </div>
    </div>
    <div class="checklist-grid">${items}</div>`;
}

function toggleChecklist(vehicleId, index) {
  if (!canEdit()) return;
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  if (!v.checklist) v.checklist = [];
  const existing = v.checklist.findIndex(c => (typeof c === "object" ? c.i : c) === index);
  if (existing === -1) {
    const today = new Date().toISOString().split("T")[0];
    v.checklist.push({ i: index, data: today });
  } else {
    v.checklist.splice(existing, 1);
  }
  saveData();
  renderContent();
}

function setChecklistDate(vehicleId, index, dateVal) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v || !v.checklist) return;
  const existing = v.checklist.find(c => (typeof c === "object" ? c.i : c) === index);
  if (existing && typeof existing === "object") {
    existing.data = dateVal;
    saveData();
  }
}

function salvaChecklistInManutenzioni(vehicleId) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v || !v.checklist || v.checklist.length === 0) {
    showAlert("❌ Nessuna voce spuntata nella checklist", false); return;
  }
  const checked = v.checklist.map(c => typeof c === "object" ? c : { i: c, data: new Date().toISOString().split("T")[0] });
  const voci = checked.map(c => `• ${CHECKLIST_VOCI[c.i]} (${fmtDate(c.data)})`).join("\n");
  DATA.manutenzioni.push({
    id: DATA.nextId.manutenzione++,
    vehicleId,
    tipo: "Ordinaria",
    descrizione: "Checklist manutenzione",
    data: checked[0].data,
    km: v.km || 0,
    costo: 0,
    note: voci
  });
  saveData();
  showAlert("✅ Checklist salvata nelle manutenzioni!");
  renderContent();
}

function resetChecklist(vehicleId) {
  const v = DATA.vehicles.find(x => x.id === vehicleId);
  if (!v) return;
  v.checklist = [];
  saveData();
  renderContent();
}

              border:1px solid ${c}22;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
              ${s.done?'opacity:0.55':''}">
        <div style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" ${s.done?'checked':''} title="${s.done?'Annulla completamento':'Segna come completata'}"
            style="width:17px;height:17px;accent-color:var(--suc);cursor:pointer;flex-shrink:0"
            onchange="completaScadenza(${s.id},${s.vehicleId},this.checked)"/>
          <div>
            <span style="color:${s.done?'var(--on-sur-var)':'var(--on-sur)'};font-weight:600${s.done?';text-decoration:line-through':''}">${esc(s.tipo)}</span>
            <div style="color:var(--on-sur-var);font-size:12px;margin-top:2px">${esc(s.v.targa||"")} — ${esc(s.v.modello||"")}</div>
            ${s.done&&s.dataCompletata?`<div style="color:var(--suc);font-size:11px">✓ fatto il ${fmtDate(s.dataCompletata)}</div>`:""}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span style="color:var(--on-sur-var);font-size:12px">${fmtDate(s.scadenza)}</span>
          ${s.done?'<span class="badge" style="background:var(--suc)22;color:var(--suc);border:1px solid var(--suc)44">FATTO</span>':badge(s.days)}
          <span style="color:var(--on-sur-var);font-size:11px">${diff}</span>
        </div>
      </div>`;
    }).join("") || `<div style="color:var(--on-sur-var);text-align:center;padding:32px">Nessuna scadenza</div>`;
  return `<h2 style="color:var(--on-sur);margin-bottom:16px;font-size:16px;letter-spacing:1px">📅 TUTTE LE SCADENZE</h2>${rows}`;
}

// Mesi da aggiungere per tipo scadenza
const RINNOVO_MESI = { "Bollo": 12, "Revisione": 24, "Tagliando": 12, "Assicurazione": 12 };

function completaScadenza(scadId, vehicleId, checked) {
  if (!canEdit()) { setTimeout(()=>renderContent(),0); return; }
  // setTimeout evita che il re-render distrugga il checkbox mentre gestisce l'evento
  setTimeout(() => {
    const s = DATA.scadenze.find(x => x.id === scadId);
    if (!s) return;

    if (!checked) {
      // Deselezionato: rimuovi flag done (annulla)
      s.done = false;
      saveData(); renderContent(); return;
    }

    const mesi = RINNOVO_MESI[s.tipo.trim()];

    // Marca la vecchia come completata (storico) — NON eliminare
    s.done = true;
    s.dataCompletata = new Date().toISOString().split("T")[0];

    if (mesi) {
      // Crea nuova scadenza partendo dalla data della vecchia
      const base = s.scadenza ? new Date(s.scadenza) : new Date();
      base.setMonth(base.getMonth() + mesi);
      const nuovaData = base.toISOString().split("T")[0];
      DATA.scadenze.push({
        id: DATA.nextId.scadenza++,
        vehicleId,
        tipo: s.tipo,
        scadenza: nuovaData,
        note: s.note || "",
        done: false
      });
      saveData(); renderContent();
      showAlert(`✅ ${s.tipo} rinnovata → ${fmtDate(nuovaData)}`);
    } else {
      saveData(); renderContent();
    }
  }, 0);
}

  DATA.vehicles = DATA.vehicles.map(v=>v.id===vehicleId?{...v,note:txt}:v);

}

function submitKm(vid) {

function submitGomma(vid) {

function submitEditVehicle(vid) {

  saveData(); closeModal(); renderContent();
}

async function fbToken() { return await CURRENT_USER.getIdToken(); }

async function fbGet(url) {
  const r = await fetch(url+"?auth="+await fbToken());
  if (!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}
async function fbPut(url, data) {
  const r = await fetch(url+"?auth="+await fbToken(), {
    method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error("HTTP "+r.status);
}
async function fbPatch(url, data) {
  const r = await fetch(url+"?auth="+await fbToken(), {
    method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error("HTTP "+r.status);
}
async function fbDelete(url) {
  await fetch(url+"?auth="+await fbToken(), { method:"DELETE" });
}

async function fbLoad() {
  if (!CURRENT_USER) throw new Error("Non autenticato");
  if (CURRENT_FLEET_ID === "personal") return await fbGet(fbUserUrl(CURRENT_USER.uid));
  return await fbGet(fbFleetDataUrl(CURRENT_FLEET_ID));
}
async function fbSave(data) {
  if (!CURRENT_USER) throw new Error("Non autenticato");
  if (CURRENT_FLEET_ID === "personal") await fbPut(fbUserUrl(CURRENT_USER.uid), data);
  else await fbPut(fbFleetDataUrl(CURRENT_FLEET_ID), data);
}

// ── Migrazione: /fleet (legacy pubblico) → /users/{uid}/fleet ─────────────
async function migrateIfNeeded() {
  try {
    const existing = await fbGet(fbUserUrl(CURRENT_USER.uid));
    if (existing?.vehicles?.length > 0) return false; // già migrato
    const r = await fetch(fbLegacyUrl()); // legacy era pubblico, no auth
    if (!r.ok) return false;
    const legacy = await r.json();
    if (!legacy?.vehicles) return false;
    await fbPut(fbUserUrl(CURRENT_USER.uid), legacy);
    console.log("Migrazione OK:", legacy.vehicles.length, "veicoli");
    return true;
  } catch(e) { console.warn("Migrazione saltata:", e.message); return false; }
}

// ── Flotte condivise ──────────────────────────────────────────────────────
function genFleetId()   { return "fl_"+Math.random().toString(36).slice(2,10); }
function genInviteCode() {
  const ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return "FLEET-"+"XXXX".replace(/X/g,()=>ch[Math.floor(Math.random()*ch.length)]);
}

async function loadMyFleets() {
  try {
    const raw = await fbGet(fbUserFleetsUrl(CURRENT_USER.uid));
    if (!raw) { MY_FLEETS={}; return; }
    const fl = {};
    for (const fid of Object.keys(raw)) {
      try {
        const [meta, members] = await Promise.all([fbGet(fbFleetMetaUrl(fid)), fbGet(fbFleetMembersUrl(fid))]);
        fl[fid] = { name: meta?.name||fid, role: members?.[CURRENT_USER.uid]||"viewer" };
      } catch(e) { /* flotta rimossa */ }
    }
    MY_FLEETS = fl;
  } catch(e) { MY_FLEETS={}; }
}

async function createFleet(name) {
  const fid = genFleetId();
  const empty = defaultData(); empty.vehicles=[]; empty.scadenze=[];
  await Promise.all([
    fbPut(fbFleetMetaUrl(fid), {name, createdBy:CURRENT_USER.uid, createdAt:Date.now()}),
    fbPut(fbFleetMembersUrl(fid), {[CURRENT_USER.uid]:"admin"}),
    fbPut(fbFleetDataUrl(fid), empty),
    fbPatch(fbUserFleetsUrl(CURRENT_USER.uid), {[fid]:true})
  ]);
  MY_FLEETS[fid] = {name, role:"admin"};
  return fid;
}

async function generateAndPublishInvite(fleetId, role) {
  const code = genInviteCode();
  const expiresAt = Date.now()+24*60*60*1000;
  const inviteData = {role, createdBy:CURRENT_USER.uid, expiresAt};
  // Salva nell'indice globale (percorso senza auth nel path)
  await fbPut(FB_BASE+"/inviteCodes/"+code+".json", {fleetId, role, expiresAt});
  // Salva anche nella flotta (best-effort)
  await fbPut(FB_BASE+"/fleets/"+fleetId+"/invites/"+code+".json", inviteData).catch(()=>null);
  return code;
}

async function joinFleetByCode(code) {
  try {
    const inv = await fbGet(FB_BASE+"/inviteCodes/"+code+".json");
    if (!inv) return {ok:false, msg:"Codice non trovato"};
    if (Date.now() > inv.expiresAt) return {ok:false, msg:"Codice scaduto (era valido 24h)"};
    const fid = inv.fleetId;
    await Promise.all([
      fbPatch(fbFleetMembersUrl(fid), {[CURRENT_USER.uid]: inv.role}),
      fbPatch(fbUserFleetsUrl(CURRENT_USER.uid), {[fid]: true})
    ]);
    const meta = await fbGet(fbFleetMetaUrl(fid)).catch(()=>null);
    MY_FLEETS[fid] = {name: meta?.name||fid, role: inv.role};
    return {ok:true, name: meta?.name||fid, role: inv.role};
  } catch(e) { return {ok:false, msg:"Errore: "+e.message}; }
}

const toArr = (v) => {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === "object") return Object.values(v).filter(x => x && typeof x === "object");
  return [];
};

function normalizeData(val) {
  return {
    vehicles:     toArr(val.vehicles),
    scadenze:     toArr(val.scadenze),
    manutenzioni: toArr(val.manutenzioni),
    kmLog:        toArr(val.kmLog),
    gomme:        toArr(val.gomme),
    nextId:       val.nextId || {scadenza:10,manutenzione:1,km:1,gomma:1}
  };
}

async function saveData() {
  SAVING = true; updateTopbar();
  try { await fbSave(DATA); }
  catch(e) { showAlert("❌ Errore salvataggio: " + e.message, false); }
  finally { SAVING = false; updateTopbar(); }
}

// Polling ogni 15 secondi per aggiornamenti del team
let pollInterval = null;
async function startPolling() {
  clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const val = await fbLoad();
      if (!val) return;
      // Non fare render se l'utente sta scrivendo nelle note
      if (VEHICLE_TAB === "note" && document.getElementById("noteArea")) {
        const curNote = document.getElementById("noteArea").value;
        DATA = normalizeData(val);
        // Ripristina il testo che l'utente sta scrivendo
        const v = DATA.vehicles.find(x => x.id === SELECTED_VEHICLE?.id);
        if (v) v.note = curNote;
      } else {
        DATA = normalizeData(val);
        render();
      }
    } catch(e) { /* silenzioso */ }
  }, 15000);
}

function openMigrateVehicleModal(vid) {

  // Flotte disponibili (escludi quella attuale, solo quelle dove sei admin/editor)
  const targets = Object.entries(MY_FLEETS)
    .filter(([fid, f]) => fid !== CURRENT_FLEET_ID && (f.role === "admin" || f.role === "editor"));
  // Aggiungi flotta personale se non è quella corrente
  const showPersonal = CURRENT_FLEET_ID !== "personal";

  if (!targets.length && !showPersonal) {

    return;
  }

  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

    : '';

  ).join('');

  overlay.innerHTML = '<div class="modal" style="max-width:380px">'
    + '<div class="modal-header"><h3>🔀 Migra ' + esc(v.targa) + '</h3>'
    + '<button class="modal-close" onclick="document.getElementById(\'fleet-overlay\').remove()">×</button></div>'
    + '<p style="color:var(--on-sur-var);font-size:13px;margin-bottom:14px">Scegli la flotta di destinazione. Il veicolo e tutti i suoi dati verranno spostati.</p>'
    + personalBtn + fleetBtns
    + '<div style="margin-top:8px"><label style="display:flex;align-items:center;gap:8px;color:var(--on-sur-var);font-size:12px;cursor:pointer">'
    + '<input type="checkbox" id="migrate-keep" style="accent-color:var(--pri)"/> Mantieni una copia anche in questa flotta</label></div>'
    + '</div>';
  document.body.appendChild(overlay);
}

async function migrateVehicle(vid, targetFleetId) {
  document.getElementById("fleet-overlay")?.remove();
  const keepCopy = document.getElementById("migrate-keep")?.checked || false;
  const v = DATA.vehicles.find(x => x.id === vid);
  if (!v) return;

  try {
    // Carica flotta destinazione
    let targetData;
    if (targetFleetId === "personal") {
      targetData = await fbGet(fbUserUrl(CURRENT_USER.uid));
    } else {
      targetData = await fbGet(fbFleetDataUrl(targetFleetId));
    }
    const dest = targetData ? normalizeData(targetData) : defaultData();

    // Calcola nuovo ID nella flotta destinazione
    const maxId = Math.max(0, ...dest.vehicles.map(x => x.id||0));
    const newVid = maxId + 1;

    // Copia veicolo
    dest.vehicles.push({...v, id: newVid});

    // Copia dati collegati con nuovo vehicleId
    ["scadenze","manutenzioni","kmLog","gomme"].forEach(key => {
      const items = (DATA[key]||[]).filter(x => x.vehicleId === vid);
      const maxItemId = Math.max(0, ...(dest[key]||[]).map(x => x.id||0));
      items.forEach((item, i) => dest[key].push({...item, id: maxItemId+i+1, vehicleId: newVid}));
    });

    // Salva nella flotta destinazione
    if (targetFleetId === "personal") {
      await fbPut(fbUserUrl(CURRENT_USER.uid), dest);
    } else {
      await fbPut(fbFleetDataUrl(targetFleetId), dest);
    }

    // Rimuovi dalla flotta corrente (a meno che keepCopy sia true)
    if (!keepCopy) {
      DATA.vehicles     = DATA.vehicles.filter(x => x.id !== vid);
      DATA.scadenze     = DATA.scadenze.filter(x => x.vehicleId !== vid);
      DATA.manutenzioni = DATA.manutenzioni.filter(x => x.vehicleId !== vid);
      DATA.kmLog        = DATA.kmLog.filter(x => x.vehicleId !== vid);
      DATA.gomme        = DATA.gomme.filter(x => x.vehicleId !== vid);
      await fbSave(DATA);
      SELECTED_VEHICLE = null; VIEW = "flotta";
    }

    const destName = targetFleetId === "personal" ? "Flotta personale" : (MY_FLEETS[targetFleetId]?.name || targetFleetId);
    renderContent();
    showAlert((keepCopy ? "📋 Copiato" : "🔀 Migrato") + " " + v.targa + " → " + destName);
  } catch(e) {
    showAlert("❌ Errore migrazione: " + e.message, false);
  }
}

async function leaveFleet(fleetId) {
  const isAdmin = MY_FLEETS[fleetId]?.role === "admin";
  const msg = isAdmin
    ? "Sei admin: eliminare la flotta la rimuoverà per tutti i membri. Continuare?"
    : "Sei sicuro di voler abbandonare questa flotta?";
  if (!confirm(msg)) return;
  try {
    if (isAdmin) {
      // Admin: elimina tutta la flotta
      await fbDelete(FB_BASE+"/fleets/"+fleetId+".json");
      // Rimuovi da tutti gli userFleets (best-effort — rimuove almeno il proprio)
      await fbDelete(FB_BASE+"/userFleets/"+CURRENT_USER.uid+"/"+fleetId+".json");
    } else {
      // Editor/Viewer: abbandona solo per sé
      await fbDelete(FB_BASE+"/fleets/"+fleetId+"/members/"+CURRENT_USER.uid+".json");
      await fbDelete(FB_BASE+"/userFleets/"+CURRENT_USER.uid+"/"+fleetId+".json");
    }
    delete MY_FLEETS[fleetId];
    document.getElementById("fleet-overlay")?.remove();
    if (CURRENT_FLEET_ID===fleetId) await switchFleet("personal");
    else openFleetManager();
    showAlert(isAdmin ? "✅ Flotta eliminata" : "✅ Flotta abbandonata");
  } catch(e) { showAlert("❌ "+e.message, false); }
}

async function copyVehiclesToFleet(targetFleetId) {
  document.getElementById("fleet-overlay")?.remove();
  // Carica dati personali
  const prevFleet = CURRENT_FLEET_ID;
  const prevRole  = CURRENT_FLEET_ROLE;
  try {
    // Leggi flotta personale
    const personalData = await fbGet(fbUserUrl(CURRENT_USER.uid));
    if (!personalData?.vehicles?.length) {
      showAlert("⚠️ Nessun veicolo nella flotta personale", false); return;
    }
    // Leggi flotta destinazione
    const targetData = await fbGet(fbFleetDataUrl(targetFleetId));
    const merged = targetData ? normalizeData(targetData) : defaultData();
    // Copia veicoli (evita duplicati per targa)
    const existingTarghe = new Set(merged.vehicles.map(v => v.targa));
    const toAdd = personalData.vehicles.filter(v => !existingTarghe.has(v.targa));
    if (!toAdd.length) { showAlert("⚠️ Tutti i veicoli sono già presenti nella flotta", false); return; }
    // Ricalcola ID per evitare collisioni
    const maxId = Math.max(0, ...merged.vehicles.map(v => v.id||0));
    toAdd.forEach((v, i) => {
      const oldId = v.id;
      const newId = maxId + i + 1;
      v = {...v, id: newId};
      merged.vehicles.push(v);
      // Copia anche scadenze/manutenzioni/km/gomme collegate
      ["scadenze","manutenzioni","kmLog","gomme"].forEach(key => {
        const items = (personalData[key]||[]).filter(x => x.vehicleId === oldId);
        items.forEach(item => merged[key].push({...item, vehicleId: newId, id: (merged.nextId[key.replace("Log","")]||1) + merged[key].length}));
      });
    });
    // Salva nella flotta destinazione
    await fbPut(fbFleetDataUrl(targetFleetId), merged);
    const flName = MY_FLEETS[targetFleetId]?.name || targetFleetId;
    showAlert('✅ ' + toAdd.length + ' veicoli copiati in "' + flName + '"!');
  } catch(e) {
    showAlert("❌ Errore: " + e.message, false);
  }
}

  const adminFleets = Object.entries(MY_FLEETS).filter(([,f]) => f.role === "admin");

}

    + '<input id="auth-email" type="email" placeholder="tua@email.com" autocomplete="email"'
    + ' onkeydown="if(event.key===\'Enter\')document.getElementById(\'auth-pwd\').focus()"/></div>'
    + '<div class="field"><label>Password</label>'
    + '<input id="auth-pwd" type="password" placeholder="min. 6 caratteri"'
    + ' onkeydown="if(event.key===\'Enter\'){isLogin?loginEmail():registerEmail()}"/></div>'
    + (isLogin ? '' :
        '<div class="field"><label>Conferma password</label>'
        + '<input id="auth-pwd2" type="password" placeholder="ripeti password"'
        + ' onkeydown="if(event.key===\'Enter\')registerEmail()"/></div>')
    + '<div id="auth-error" class="auth-error"></div>'
    + '<button class="btn" style="width:100%;padding:11px;margin-top:8px;font-size:14px"'
    + ' onclick="' + (isLogin ? 'loginEmail()' : 'registerEmail()') + '">'
    + (isLogin ? '🔑 Accedi' : '✨ Crea account')
    + '</button></div></div>';
}

function setAuthError(msg) {
  const el = document.getElementById("auth-error");
  if (el) el.textContent = msg;
}

async function loginGoogle() {
  try {
    // Prova popup prima (più veloce), fallback a redirect se bloccato
    await fbAuth.signInWithPopup(googleProvider);
  } catch(e) {
    if (e.code === "auth/popup-blocked" || e.code === "auth/popup-closed-by-user") {
      // Su mobile/browser restrittivi usa redirect
      try { await fbAuth.signInWithRedirect(googleProvider); }
      catch(e2) { setAuthError(authErr(e2.code)); }
    } else {
      setAuthError(authErr(e.code));
    }
  }
}

async function loginEmail() {
  const email = (document.getElementById("auth-email")?.value||"").trim();
  const pwd   = document.getElementById("auth-pwd")?.value||"";
  if (!email||!pwd) { setAuthError("Compila tutti i campi"); return; }
  try {
    await fbAuth.signInWithEmailAndPassword(email, pwd);
  } catch(e) { setAuthError(authErr(e.code)); }
}

async function registerEmail() {
  const email = (document.getElementById("auth-email")?.value||"").trim();
  const pwd   = document.getElementById("auth-pwd")?.value||"";
  const pwd2  = document.getElementById("auth-pwd2")?.value||"";
  if (!email||!pwd) { setAuthError("Compila tutti i campi"); return; }
  if (pwd!==pwd2)   { setAuthError("Le password non coincidono"); return; }
  if (pwd.length<6) { setAuthError("Password minimo 6 caratteri"); return; }
  try {
    await fbAuth.createUserWithEmailAndPassword(email, pwd);
  } catch(e) { setAuthError(authErr(e.code)); }
}

async function doLogout() {
  clearInterval(pollInterval);
  CURRENT_USER = null;
  DATA = null;
  await fbAuth.signOut();
  showAuthScreen();
}

function authErr(code) {
  return ({
    "auth/user-not-found":      "Account non trovato",
    "auth/wrong-password":      "Password errata",
    "auth/invalid-credential":  "Email o password errati",
    "auth/email-already-in-use":"Email già registrata",
    "auth/invalid-email":       "Email non valida",
    "auth/weak-password":       "Password troppo debole (min. 6 caratteri)",
    "auth/too-many-requests":   "Troppi tentativi, riprova tra poco",
    "auth/popup-closed-by-user":"Finestra Google chiusa",
  })[code] || ("Errore: " + code);
}

// ═══════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════
async function bootUser(user) {
  CURRENT_USER = user;
  CURRENT_FLEET_ID   = "personal";
  CURRENT_FLEET_ROLE = "admin";

  const appEl = document.getElementById("app");
  const setStatus = msg => {
    const s = document.getElementById("boot-status");
    if (s) s.textContent = msg;
  };
  appEl.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px">
      <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
      <div id="boot-status" style="color:var(--on-sur-var);font-size:13px">Connessione...</div>
    </div>`;

  try {
    setStatus("Controllo dati esistenti...");
    const migrated = await migrateIfNeeded();
    if (migrated) setStatus("✅ Dati migrati al nuovo formato!");

    setStatus("Caricamento flotte condivise...");
    await loadMyFleets();

    setStatus("Caricamento flotta personale...");
    const val = await fbLoad();
    if (!val) {
      DATA = defaultData(); DATA.vehicles=[]; DATA.scadenze=[];
      await fbSave(DATA);
    } else {
      DATA = normalizeData(val);
    }
    render();
    startPolling();
  } catch(e) {
    appEl.innerHTML =
      `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
        <div style="font-size:48px">❌</div>
        <div style="color:var(--err);font-size:16px;font-weight:700">Errore connessione</div>
        <div style="color:var(--on-sur-var);font-size:13px;max-width:400px;text-align:center">${e.message}</div>
        <button class="btn" onclick="bootUser(CURRENT_USER)">🔄 Riprova</button>
      </div>`;
  }
}

window.addEventListener("load", () => {
  setTimeout(async () => {
    if (typeof fbAuth === "undefined") { showAuthScreen(); return; }

    try {
      // Prima controlla se stiamo tornando da un redirect Google
      const redirectResult = await fbAuth.getRedirectResult();
      if (redirectResult && redirectResult.user) {
        // Redirect completato — utente loggato
        bootUser(redirectResult.user);
        return;
      }
    } catch(e) {
      console.warn("getRedirectResult:", e.code);
    }

    // Nessun redirect — controlla sessione esistente con timeout
    let resolved = false;
    const timer = setTimeout(() => {
      if (!resolved) { resolved = true; showAuthScreen(); }
    }, 5000);

    fbAuth.onAuthStateChanged(user => {
      if (resolved) return;
      resolved = true;
      clearTimeout(timer);
      if (user) { bootUser(user); }
      else      { showAuthScreen(); }
    });
  }, 100);
});

</script>
